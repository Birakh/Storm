<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm the House</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#080c14;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Courier New',monospace; color:#c8d4e8; overflow:hidden;
  }
  #hud {
    width:800px; display:flex; justify-content:space-between; align-items:center; padding:10px 4px;
  }
  .hud-group { display:flex; gap:24px; }
  .hud-item  { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .hud-label { font-size:10px; letter-spacing:.15em; color:#4a6080; text-transform:uppercase; }
  .hud-value { font-size:18px; font-weight:bold; }
  #hud-wave  { color:#7ab8e8; }
  #hud-hp    { color:#e87a7a; }
  #hud-money { color:#7ae8a0; }
  #hud-score { color:#e8c87a; }

  canvas { display:block; border:1px solid #1a2840; cursor:crosshair; image-rendering:pixelated; }

  #message {
    margin-top:10px; font-size:11px; letter-spacing:.12em;
    color:#2a4060; text-transform:uppercase; height:16px; transition:color .4s;
  }

  /* ── SHOP OVERLAY ─────────────────────────────────────────── */
  #shop {
    display:none; position:absolute;
    width:800px; height:450px;
    background:rgba(8,12,20,.93);
    border:1px solid #1a2840;
    flex-direction:column; align-items:center; justify-content:center; gap:18px;
  }
  #shop.open { display:flex; }
  #shop h2 {
    font-size:13px; letter-spacing:.25em; color:#4a6080; text-transform:uppercase; margin-bottom:4px;
  }
  #shop-money-display {
    font-size:22px; font-weight:bold; color:#7ae8a0; letter-spacing:.08em;
  }
  .shop-grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:680px;
  }
  .shop-card {
    background:#0d1525; border:1px solid #1a2840;
    padding:12px 14px; border-radius:3px;
    display:flex; flex-direction:column; gap:6px;
    transition:border-color .2s;
  }
  .shop-card:hover { border-color:#2a4060; }
  .shop-card.maxed { opacity:.4; }
  .shop-name  { font-size:12px; font-weight:bold; letter-spacing:.1em; color:#c8d4e8; }
  .shop-desc  { font-size:10px; color:#4a6080; line-height:1.5; min-height:28px; }
  .shop-meta  { font-size:10px; color:#4a6080; }
  .shop-btn {
    margin-top:4px; padding:6px 0; font-family:'Courier New',monospace;
    font-size:11px; letter-spacing:.1em; color:#7ae8a0;
    background:transparent; border:1px solid #1d4030; border-radius:2px;
    cursor:pointer; text-transform:uppercase; transition:background .15s, color .15s;
  }
  .shop-btn:hover:not(:disabled) { background:#1d4030; }
  .shop-btn:disabled { opacity:.35; cursor:not-allowed; color:#4a6080; border-color:#1a2840; }
  .shop-btn.unaffordable { color:#e87a7a; border-color:#3d1a1a; }
  #next-wave-btn {
    padding:10px 40px; font-family:'Courier New',monospace; font-size:12px;
    letter-spacing:.2em; color:#7ab8e8; background:transparent;
    border:1px solid #1a3050; border-radius:2px; cursor:pointer; text-transform:uppercase;
    transition:background .15s;
  }
  #next-wave-btn:hover { background:#0d1a2a; }

  /* ── CHEAT TOAST ──────────────────────────────────────────── */
  #cheat-toast {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:#0d1a2a; border:1px solid #4a6080; color:#7ae8a0;
    font-family:'Courier New',monospace; font-size:12px; letter-spacing:.15em;
    padding:6px 18px; border-radius:3px; opacity:0; transition:opacity .3s;
    pointer-events:none; text-transform:uppercase; white-space:nowrap;
  }
  #cheat-toast.show { opacity:1; }
</style>
</head>
<body>

<div id="cheat-toast"></div>

<div id="hud">
  <div class="hud-group">
    <div class="hud-item"><span class="hud-label">Wave</span><span class="hud-value" id="hud-wave">1</span></div>
    <div class="hud-item"><span class="hud-label">Wall HP</span><span class="hud-value" id="hud-hp">100</span></div>
  </div>
  <div class="hud-item" style="font-size:13px;letter-spacing:.2em;color:#2a4060;">STORM THE HOUSE</div>
  <div class="hud-group">
    <div class="hud-item"><span class="hud-label">Money</span><span class="hud-value" id="hud-money">$0</span></div>
    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-value" id="hud-score">0</span></div>
  </div>
</div>

<div style="position:relative;">
  <canvas id="game" width="800" height="450"></canvas>

  <!-- SHOP OVERLAY (sits over the canvas) -->
  <div id="shop">
    <h2>Between waves — spend your money</h2>
    <div id="shop-money-display">$0</div>
    <div class="shop-grid" id="shop-grid"></div>
    <button id="next-wave-btn" onclick="closeShop()">▶  Next Wave</button>
  </div>
</div>

<div id="message">Step 3 · Shop · Turrets · Gunmen · Upgrades</div>

<script>
// ─── CANVAS ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── STATE ────────────────────────────────────────────────────────────────────
const WIN_WAVE = 10;   // survive this many waves to win

const state = {
  wave: 1, wallHp: 100, wallMaxHp: 100,
  money: 0, score: 0, paused: false,
  phase: 'playing',      // 'playing' | 'shop' | 'gameover' | 'win'

  enemies: [], bullets: [], particles: [], floaters: [],
  turrets: [], gunmen: [],

  // Upgrades
  upgrades: {
    bulletDmg:  1,
    wallArmour: 0,
  },

  // Counts / limits
  gunmenCount: 0, gunmenMax: 4,
  turretCount: 0, turretMax: 2,
  wallRepairs: 0,

  // Wave spawning
  spawnQueue: [], spawnTimer: 0, spawnInterval: 90, waveClearing: false,

  // Player shoot cooldown
  shootCooldown: 0, shootCooldownMax: 6,

  // Screenshake
  shake: 0,

  cheats: { godMode:false, noclipDmg:false, slowMode:false, konamiActive:false },
};

// High score (persisted)
let highScore = parseInt(localStorage.getItem('sth_highscore') || '0');

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const WALL_X   = 80, GROUND_Y = H - 60;
const WALL_W   = 18, WALL_H   = 120, WALL_TOP = GROUND_Y - WALL_H;
const GUN_X    = WALL_X, GUN_Y = GROUND_Y - 30;

// ─── WEB AUDIO ────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, vol, attack, decay, detune=0) {
  try {
    const g = AC.createGain(), o = AC.createOscillator();
    o.type = type; o.frequency.value = freq; o.detune.value = detune;
    g.gain.setValueAtTime(0, AC.currentTime);
    g.gain.linearRampToValueAtTime(vol, AC.currentTime + attack);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + attack + decay);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + attack + decay + .05);
  } catch(e) {}
}

function playNoise(vol, dur, freq=800) {
  try {
    const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1);
    const src = AC.createBufferSource();
    const flt = AC.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=freq;
    const g   = AC.createGain();
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    src.buffer = buf;
    src.connect(flt); flt.connect(g); g.connect(AC.destination);
    src.start(); src.stop(AC.currentTime + dur + .05);
  } catch(e) {}
}

const SFX = {
  shoot:     () => { playTone(520, 'square',   .08, .005, .08); playNoise(.04, .05, 1200); },
  hit:       () => { playNoise(.12, .06, 600); },
  death:     () => { playTone(220, 'sawtooth', .12, .005, .15, -200); playNoise(.08, .1, 300); },
  wallHit:   () => { playTone(80,  'sine',     .18, .01,  .2); playNoise(.15, .12, 150); },
  waveEnd:   () => {
    [440,550,660,880].forEach((f,i) => setTimeout(() => playTone(f,'sine',.1,.01,.25), i*80));
  },
  win:       () => {
    [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',.15,.02,.5), i*150));
  },
  buy:       () => { playTone(660, 'sine', .1, .01, .15); playTone(880, 'sine', .08, .05, .1); },
  denied:    () => { playTone(200, 'square', .1, .01, .12); },
};

// Unlock AudioContext on first user gesture
canvas.addEventListener('click', () => { if (AC.state === 'suspended') AC.resume(); }, { once: true });

const ENEMY_TYPES = {
  grunt:  { label:'grunt',  w:16,h:22, hp:2,  speed:.8,  dmg:5,  reward:10,  color:'#D85A30', headColor:'#c8a87a' },
  runner: { label:'runner', w:12,h:18, hp:1,  speed:1.8, dmg:3,  reward:8,   color:'#993C1D', headColor:'#b89868' },
  tank:   { label:'tank',   w:24,h:28, hp:8,  speed:.4,  dmg:15, reward:30,  color:'#534AB7', headColor:'#a0a0d0' },
  boss:   { label:'BOSS',   w:36,h:40, hp:30, speed:.3,  dmg:25, reward:100, color:'#993556', headColor:'#e8a0b8' },
};

// ─── SHOP DEFINITIONS ─────────────────────────────────────────────────────────
// Each item: { id, name, desc, baseCost, maxLevel, action, canBuy }
const SHOP_ITEMS = [
  {
    id:'repair', name:'Repair Wall', desc:'Restore +30 HP to the wall.',
    baseCost: () => 50 + state.wallRepairs * 20,
    maxLevel: Infinity,
    label: () => `+30 HP  ($${50 + state.wallRepairs * 20})`,
    action() {
      state.wallHp = Math.min(state.wallMaxHp, state.wallHp + 30);
      state.wallRepairs++;
    },
    available: () => state.wallHp < state.wallMaxHp,
  },
  {
    id:'gunman', name:'Hire Gunman', desc:'A rifleman on the wall. Auto-shoots nearest enemy.',
    baseCost: () => 80 + state.gunmenCount * 30,
    maxLevel: 4,
    label: () => state.gunmenCount >= state.gunmenMax
      ? 'Full (4/4)'
      : `Hire  ($${80 + state.gunmenCount * 30})  [${state.gunmenCount}/${state.gunmenMax}]`,
    action()  { addGunman(); },
    available: () => state.gunmenCount < state.gunmenMax,
  },
  {
    id:'turret', name:'Build Turret', desc:'Rapid-fire auto-turret. Targets closest enemy in range.',
    baseCost: () => 150 + state.turretCount * 80,
    maxLevel: 2,
    label: () => state.turretCount >= state.turretMax
      ? 'Full (2/2)'
      : `Build  ($${150 + state.turretCount * 80})  [${state.turretCount}/${state.turretMax}]`,
    action()  { addTurret(); },
    available: () => state.turretCount < state.turretMax,
  },
  {
    id:'dmg', name:'Bigger Bullets', desc:'Player bullets deal +1 damage. Stacks up to 5×.',
    baseCost: () => 80 + (state.upgrades.bulletDmg - 1) * 40,
    maxLevel: 5,
    label: () => state.upgrades.bulletDmg >= 5
      ? 'Max damage'
      : `Upgrade  ($${80 + (state.upgrades.bulletDmg - 1) * 40})  [Lv ${state.upgrades.bulletDmg}/5]`,
    action()  { state.upgrades.bulletDmg++; },
    available: () => state.upgrades.bulletDmg < 5,
  },
  {
    id:'rate', name:'Faster Reload', desc:'Reduce player shoot cooldown. Stacks up to 4×.',
    baseCost: () => 70 + (4 - Math.round(state.shootCooldownMax)) * 20,
    maxLevel: 4,
    label: () => state.shootCooldownMax <= 2
      ? 'Max fire rate'
      : `Upgrade  ($${70 + (4 - Math.round(state.shootCooldownMax)) * 20})`,
    action()  { state.shootCooldownMax = Math.max(2, state.shootCooldownMax - 1); SFX.buy(); },
    available: () => state.shootCooldownMax > 2,
  },
  {
    id:'armour', name:'Wall Armour', desc:'Reduce incoming wall damage by 20%. Max 3 stacks.',
    baseCost: () => 100 + state.upgrades.wallArmour * 60,
    maxLevel: 3,
    label: () => state.upgrades.wallArmour >= 3
      ? 'Max armour'
      : `Upgrade  ($${100 + state.upgrades.wallArmour * 60})  [${state.upgrades.wallArmour}/3]`,
    action()  { state.upgrades.wallArmour++; },
    available: () => state.upgrades.wallArmour < 3,
  },
];

// Gunman slots on the wall (y offsets from wall top)
const GUNMAN_SLOTS = [
  { yOff: 20,  side: 'right' },
  { yOff: 50,  side: 'right' },
  { yOff: 80,  side: 'right' },
  { yOff: 110, side: 'right' },
];

// Turret slots above the wall
const TURRET_SLOTS = [
  { x: WALL_X + 30, y: WALL_TOP - 12 },
  { x: WALL_X + 70, y: WALL_TOP - 12 },
];

function addGunman() {
  const slot = GUNMAN_SLOTS[state.gunmenCount];
  state.gunmen.push({
    x: WALL_X + WALL_W / 2 + 6,
    y: WALL_TOP + slot.yOff,
    fireTimer: 0,
    fireRate: 80,    // frames between shots
    dmg: 1,
    range: 380,
    angle: 0,
  });
  state.gunmenCount++;
}

function addTurret() {
  const slot = TURRET_SLOTS[state.turretCount];
  state.turrets.push({
    x: slot.x, y: slot.y,
    fireTimer: 0,
    fireRate: 30,   // rapid fire
    dmg: 2,
    range: 420,
    angle: 0,
  });
  state.turretCount++;
}

// ─── SHOP UI ─────────────────────────────────────────────────────────────────
function openShop() {
  state.phase = 'shop';
  renderShop();
  document.getElementById('shop').classList.add('open');
  setMsg('Between waves — visit the shop', '#7ae8a0');
}

function closeShop() {
  document.getElementById('shop').classList.remove('open');
  endWave();
}

function renderShop() {
  document.getElementById('shop-money-display').textContent = '$' + state.money;
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  SHOP_ITEMS.forEach(item => {
    const cost      = item.baseCost();
    const available = item.available();
    const canAfford = state.money >= cost && available;

    const card = document.createElement('div');
    card.className = 'shop-card' + (!available ? ' maxed' : '');

    const btn = document.createElement('button');
    btn.className = 'shop-btn' + (!canAfford ? ' unaffordable' : '');
    btn.disabled  = !canAfford;
    btn.textContent = item.label();
    btn.onclick = () => {
      if (state.money < cost || !item.available()) { SFX.denied(); return; }
      state.money -= cost;
      item.action();
      SFX.buy();
      renderShop();
    };

    card.innerHTML = `<div class="shop-name">${item.name}</div><div class="shop-desc">${item.desc}</div>`;
    card.appendChild(btn);
    grid.appendChild(card);
  });
}

// ─── WAVE SYSTEM ──────────────────────────────────────────────────────────────
function waveDifficulty(wave) {
  // Returns a multiplier object applied to all enemies in this wave
  return {
    hpMult:    1 + (wave - 1) * 0.18,           // +18% HP per wave
    speedMult: 1 + (wave - 1) * 0.06,           // +6% speed per wave
    spawnInterval: Math.max(35, 90 - wave * 5), // spawns speed up
  };
}

function waveComposition(wave) {
  const list = [], count = 4 + wave * 2;
  for (let i = 0; i < count; i++) {
    const r = Math.random();
    if (wave >= 4 && r < .08)      list.push('boss');
    else if (wave >= 3 && r < .2)  list.push('tank');
    else if (wave >= 2 && r < .35) list.push('runner');
    else                            list.push('grunt');
  }
  return list;
}

function startWave() {
  const q    = waveComposition(state.wave);
  const diff = waveDifficulty(state.wave);
  state.spawnQueue     = [...q];
  state.spawnTimer     = 0;
  state.spawnInterval  = diff.spawnInterval;
  state._waveDiff      = diff;
  state.waveClearing   = false;
  state.phase          = 'playing';
  setMsg('Wave ' + state.wave + (state.wave === WIN_WAVE ? '  ★ FINAL WAVE ★' : '') + ' — ' + q.length + ' enemies', '#7ab8e8');
}

function endWave() {
  state.enemies = []; state.bullets = [];
  // Check win
  if (state.wave >= WIN_WAVE) {
    triggerWin();
    return;
  }
  state.wave++;
  startWave();
}

function triggerWin() {
  state.phase = 'win';
  if (state.score > highScore) { highScore = state.score; localStorage.setItem('sth_highscore', highScore); }
  SFX.win();
  document.getElementById('shop').classList.remove('open');
  setMsg('You survived all ' + WIN_WAVE + ' waves!', '#e8c87a');
}

function spawnEnemy(typeKey) {
  const t    = ENEMY_TYPES[typeKey];
  const diff = state._waveDiff || { hpMult:1, speedMult:1 };
  const hp   = Math.ceil(t.hp * diff.hpMult);
  state.enemies.push({
    x: W + 10, y: GROUND_Y - t.h + (Math.random() - .5) * 8,
    w: t.w, h: t.h, hp, maxHp: hp,
    speed: t.speed * diff.speedMult * (.9 + Math.random() * .2),
    dmg: t.dmg, reward: t.reward, type: t,
    bob: Math.random() * Math.PI * 2,
  });
}

// ─── SHOOTING ─────────────────────────────────────────────────────────────────
const mouse = { x: W/2, y: H/2 };
let mouseDown = false;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top)  * (H / r.height);
});
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup',   () => mouseDown = false);
canvas.addEventListener('click', e => {
  if (state.phase !== 'playing') return;
  if (state.shootCooldown > 0) return;
  shootBullet(mouse.x, mouse.y, GUN_X, GUN_Y, state.upgrades.bulletDmg, 9);
  state.shootCooldown = state.shootCooldownMax;
  spawnMuzzleFlash(GUN_X, GUN_Y);
  SFX.shoot();
});

function shootBullet(tx, ty, ox, oy, dmg, speed, color) {
  const dx = tx - ox, dy = ty - oy, d = Math.hypot(dx, dy) || 1;
  state.bullets.push({
    x: ox, y: oy,
    vx: (dx/d) * speed,
    vy: (dy/d) * speed,
    dmg, color: color || '#EF9F27',
  });
}

// ─── CHEAT SYSTEM ─────────────────────────────────────────────────────────────
let cheatBuffer = '', toastTimer = null;

const CHEAT_CODES = {
  IDDQD:     () => { state.cheats.godMode    = !state.cheats.godMode;   toast(state.cheats.godMode    ? 'GOD MODE on'    : 'GOD MODE off',    '#7ae8a0'); },
  IDKFA:     () => { state.money += 500;                                 toast('IDKFA — +$500',                                               '#e8c87a'); renderShop(); },
  BIGBAD:    () => { spawnEnemy('boss');                                 toast('BIGBAD — Boss incoming!',                                      '#ED93B1'); },
  KABOOM:    () => {
    const n = state.enemies.length;
    state.enemies.forEach(e => { spawnDeathParticles(e.x+e.w/2, e.y+e.h/2, e.type.color); state.money += e.type.reward; state.score += e.type.reward; });
    state.enemies = [];
    toast('KABOOM — ' + n + ' enemies obliterated', '#EF9F27');
  },
  SLOWMO:    () => { state.cheats.slowMode   = !state.cheats.slowMode;  toast(state.cheats.slowMode   ? 'SLOWMO on'      : 'SLOWMO off',       '#85B7EB'); },
  WAVESKIP:  () => { toast('WAVESKIP — wave ' + (state.wave >= WIN_WAVE ? 'FINAL' : state.wave+1), '#7ab8e8'); endWave(); },
  NOCLIPDMG: () => { state.cheats.noclipDmg = !state.cheats.noclipDmg; toast(state.cheats.noclipDmg ? 'NOCLIPDMG on'   : 'NOCLIPDMG off',    '#9FE1CB'); },
  FULLSHOP:  () => { state.money += 9999;                               toast('FULLSHOP — $9999 · buy everything',                            '#e8c87a'); renderShop(); },
};

const KONAMI_SEQ = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiBuffer = [];

function toast(msg, color='#7ae8a0') {
  const el = document.getElementById('cheat-toast');
  el.textContent = '★  ' + msg + '  ★'; el.style.color = color;
  el.classList.add('show'); clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function setMsg(text, color='#4a6080') {
  const el = document.getElementById('message');
  el.textContent = text; el.style.color = color;
}

document.addEventListener('keydown', e => {
  konamiBuffer.push(e.key);
  if (konamiBuffer.length > KONAMI_SEQ.length) konamiBuffer.shift();
  if (konamiBuffer.join() === KONAMI_SEQ.join()) {
    state.cheats.konamiActive = !state.cheats.konamiActive;
    toast(state.cheats.konamiActive ? '↑↑↓↓←→←→BA — DOUBLE MONEY!' : 'Konami off', '#ED93B1');
    konamiBuffer = [];
  }
  if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    cheatBuffer = (cheatBuffer + e.key.toUpperCase()).slice(-12);
    for (const code of Object.keys(CHEAT_CODES)) {
      if (cheatBuffer.endsWith(code)) { CHEAT_CODES[code](); cheatBuffer = ''; break; }
    }
  }
});

// ─── PARTICLES & FLOATERS ────────────────────────────────────────────────────
function spawnMuzzleFlash(x, y) {
  for (let i=0; i<5; i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    state.particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:10+Math.random()*6, maxLife:16, color:Math.random()>.5?'#e8c87a':'#e87a40', r:1.5+Math.random()*2 });
  }
}
function spawnDeathParticles(x, y, color) {
  for (let i=0; i<10; i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
    state.particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1,
      life:18+Math.random()*12, maxLife:30, color, r:2+Math.random()*3 });
  }
}
function spawnHitSpark(x, y, color) {
  for (let i=0; i<3; i++)
    state.particles.push({ x,y, vx:(Math.random()-.5)*5, vy:-1-Math.random()*3,
      life:8, maxLife:8, color:color||'#EF9F27', r:1.5 });
}
function spawnFloater(x, y, text, color) {
  state.floaters.push({ x, y, text, color, life:50, maxLife:50 });
}

// ─── AUTO-DEFENDERS ───────────────────────────────────────────────────────────
function nearestEnemy(ox, oy, range) {
  let best = null, bestDist = range;
  for (const e of state.enemies) {
    const d = Math.hypot(e.x + e.w/2 - ox, e.y + e.h/2 - oy);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  return best;
}

function updateDefenders(slow) {
  // Gunmen
  for (const g of state.gunmen) {
    g.fireTimer = Math.max(0, g.fireTimer - slow);
    const target = nearestEnemy(g.x, g.y, g.range);
    if (target) {
      g.angle = Math.atan2(target.y + target.h/2 - g.y, target.x + target.w/2 - g.x);
      if (g.fireTimer === 0) {
        shootBullet(target.x + target.w/2, target.y + target.h/2, g.x, g.y, g.dmg, 7, '#7ab8e8');
        spawnMuzzleFlash(g.x, g.y);
        g.fireTimer = g.fireRate;
      }
    }
  }

  // Turrets
  for (const t of state.turrets) {
    t.fireTimer = Math.max(0, t.fireTimer - slow);
    const target = nearestEnemy(t.x, t.y, t.range);
    if (target) {
      t.angle = Math.atan2(target.y + target.h/2 - t.y, target.x + target.w/2 - t.x);
      if (t.fireTimer === 0) {
        shootBullet(target.x + target.w/2, target.y + target.h/2, t.x, t.y, t.dmg, 10, '#7ae8a0');
        spawnHitSpark(t.x, t.y, '#7ae8a0');
        t.fireTimer = t.fireRate;
      }
    }
  }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  if (state.paused || state.phase === 'gameover' || state.phase === 'win') return;
  if (state.phase === 'shop') return;
  const slow = state.cheats.slowMode ? .35 : 1;

  // Screenshake decay
  state.shake = Math.max(0, state.shake - .8);

  // Player shoot cooldown
  if (state.shootCooldown > 0) state.shootCooldown -= slow;

  // Spawn queue
  state.spawnTimer += slow;
  if (state.spawnQueue.length > 0 && state.spawnTimer >= state.spawnInterval) {
    state.spawnTimer = 0;
    spawnEnemy(state.spawnQueue.shift());
  }

  // Defenders
  updateDefenders(slow);

  // Bullets → collision
  state.bullets = state.bullets.filter(b => {
    b.x += b.vx * slow; b.y += b.vy * slow;
    let hit = false;
    state.enemies = state.enemies.filter(e => {
      if (!hit && b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
        e.hp -= b.dmg; hit = true; spawnHitSpark(b.x, b.y, b.color);
        SFX.hit();
        if (e.hp <= 0) {
          const reward = state.cheats.konamiActive ? e.type.reward*2 : e.type.reward;
          state.money += reward; state.score += reward;
          spawnDeathParticles(e.x+e.w/2, e.y+e.h/2, e.type.color);
          spawnFloater(e.x+e.w/2, e.y-4, '+$'+reward, '#e8c87a');
          state.shake = Math.max(state.shake, 3);
          SFX.death();
          return false;
        }
      }
      return true;
    });
    return !hit && b.x > -10 && b.x < W+10 && b.y > -20 && b.y < H+20;
  });

  // Enemies move & attack
  const dmgReduction = state.upgrades.wallArmour * .2;
  let wallWasHit = false;
  state.enemies.forEach(e => {
    e.x   -= e.speed * slow;
    e.bob += .12 * slow;
    if (e.x <= WALL_X + WALL_W/2) {
      if (!state.cheats.godMode && !state.cheats.noclipDmg) {
        state.wallHp = Math.max(0, state.wallHp - e.dmg * .04 * slow * (1 - dmgReduction));
        wallWasHit = true;
      }
      if (state.wallHp <= 0) {
        state.phase = 'gameover';
        if (state.score > highScore) { highScore = state.score; localStorage.setItem('sth_highscore', highScore); }
      }
    }
  });
  if (wallWasHit) { state.shake = Math.max(state.shake, 6); SFX.wallHit(); }

  // Wave clear → open shop
  if (!state.waveClearing && state.spawnQueue.length === 0 && state.enemies.length === 0) {
    state.waveClearing = true;
    SFX.waveEnd();
    setTimeout(() => { if (state.phase === 'playing') openShop(); }, 800);
  }

  // Particles
  state.particles = state.particles.filter(p => {
    p.x += p.vx*slow; p.y += p.vy*slow; p.vy += .08*slow; p.vx *= .92; p.life--;
    return p.life > 0;
  });

  // Floaters
  state.floaters = state.floaters.filter(f => { f.y -= .6*slow; f.life--; return f.life > 0; });
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawSky() {
  ctx.fillStyle = '#080c14'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(200,212,232,.4)';
  for (const [sx,sy] of [[40,20],[120,55],[200,15],[310,40],[450,25],[560,60],[680,18],
    [740,45],[95,80],[270,70],[400,85],[520,30],[620,75],[760,90],[30,100],[160,110],[500,10],[350,90],[640,50],[180,38]])
    ctx.fillRect(sx, sy, 1, 1);
  ctx.fillStyle = '#0d1525';
  ctx.beginPath();
  ctx.moveTo(0,GROUND_Y-20);
  ctx.bezierCurveTo(100,GROUND_Y-80,200,GROUND_Y-40,300,GROUND_Y-60);
  ctx.bezierCurveTo(400,GROUND_Y-90,500,GROUND_Y-50,600,GROUND_Y-70);
  ctx.bezierCurveTo(700,GROUND_Y-30,750,GROUND_Y-55,W,GROUND_Y-20);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
}

function drawGround() {
  ctx.fillStyle = '#0f1a2a'; ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
  ctx.strokeStyle = '#1a2840'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(W,GROUND_Y); ctx.stroke();
}

function drawWall() {
  const shakeX = (state.wallHp < 25 && state.phase === 'playing') ? (Math.random()-.5)*2 : 0;
  ctx.save(); ctx.translate(shakeX, 0);
  ctx.fillStyle = state.cheats.godMode ? '#1e5030' : '#1e3050';
  ctx.fillRect(WALL_X-WALL_W/2, WALL_TOP, WALL_W, WALL_H);
  const barW=44, barH=5, barX=WALL_X-barW/2, barY=WALL_TOP-14;
  ctx.fillStyle = '#0d1525'; ctx.fillRect(barX, barY, barW, barH);
  const r = Math.max(0, state.wallHp/state.wallMaxHp);
  ctx.fillStyle = r > .5 ? '#7ae8a0' : r > .25 ? '#e8c87a' : '#e87a7a';
  ctx.fillRect(barX, barY, barW*r, barH);
  if (state.cheats.godMode) { ctx.strokeStyle='#7ae8a0'; ctx.lineWidth=1; ctx.strokeRect(WALL_X-WALL_W/2-1,WALL_TOP-1,WALL_W+2,WALL_H+2); }
  ctx.fillStyle = state.cheats.godMode ? '#1e5030' : '#1e3050';
  for (let i=0;i<3;i++) ctx.fillRect(WALL_X-WALL_W/2+i*8-2, WALL_TOP-8, 5, 10);
  ctx.restore();
}

function drawGunmen() {
  for (const g of state.gunmen) {
    ctx.save();
    ctx.translate(g.x, g.y);
    // barrel
    ctx.rotate(g.angle);
    ctx.fillStyle = '#7ab8e8';
    ctx.fillRect(0, -2, 14, 4);
    ctx.restore();
    // body dot
    ctx.fillStyle = '#3a5a80';
    ctx.beginPath(); ctx.arc(g.x, g.y, 5, 0, Math.PI*2); ctx.fill();
    // range ring (faint)
    ctx.strokeStyle = 'rgba(122,184,232,.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(g.x, g.y, g.range, 0, Math.PI*2); ctx.stroke();
  }
}

function drawTurrets() {
  for (const t of state.turrets) {
    // base platform
    ctx.fillStyle = '#1e4040';
    ctx.fillRect(t.x-10, t.y, 20, 10);
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle);
    ctx.fillStyle = '#5DCAA5';
    ctx.fillRect(0, -3, 18, 6);
    ctx.restore();
    ctx.fillStyle = '#3a7a60';
    ctx.beginPath(); ctx.arc(t.x, t.y, 7, 0, Math.PI*2); ctx.fill();
    // range ring
    ctx.strokeStyle = 'rgba(93,202,165,.07)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI*2); ctx.stroke();
  }
}

function drawGun() {
  const angle = Math.atan2(mouse.y-GUN_Y, mouse.x-GUN_X);
  ctx.save(); ctx.translate(GUN_X, GUN_Y); ctx.rotate(angle);
  ctx.fillStyle = '#5DCAA5'; ctx.fillRect(0,-4,26,8);
  ctx.fillStyle = '#3a7a60'; ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.setLineDash([4,8]); ctx.strokeStyle='rgba(93,202,165,.18)'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(GUN_X+Math.cos(angle)*28, GUN_Y+Math.sin(angle)*28);
  ctx.lineTo(GUN_X+Math.cos(angle)*90, GUN_Y+Math.sin(angle)*90);
  ctx.stroke(); ctx.restore();
}

function drawStickFigure(e) {
  const cx=e.x+e.w/2, bob=Math.sin(e.bob)*2, t=e.type, sc=e.w/16;
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(cx,GROUND_Y+2,e.w*.7,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=t.color; ctx.fillRect(e.x+e.w*.25, e.y+e.h*.35+bob, e.w*.5, e.h*.4);
  ctx.fillStyle=t.headColor; ctx.beginPath(); ctx.arc(cx,e.y+e.h*.2+bob,e.w*.28,0,Math.PI*2); ctx.fill();
  const armSwing=Math.sin(e.bob*2)*8, legSwing=Math.sin(e.bob*2)*6;
  ctx.strokeStyle=t.color; ctx.lineWidth=2*sc; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(cx,e.y+e.h*.42+bob); ctx.lineTo(cx-e.w*.5,e.y+e.h*.52+bob+armSwing);
  ctx.moveTo(cx,e.y+e.h*.42+bob); ctx.lineTo(cx+e.w*.5,e.y+e.h*.52+bob-armSwing);
  ctx.moveTo(cx,e.y+e.h*.75+bob); ctx.lineTo(cx-e.w*.3,e.y+e.h+legSwing);
  ctx.moveTo(cx,e.y+e.h*.75+bob); ctx.lineTo(cx+e.w*.3,e.y+e.h-legSwing);
  ctx.stroke();
  if (e.hp < e.maxHp) {
    ctx.fillStyle='#0d1525'; ctx.fillRect(e.x-2,e.y-8,e.w+4,4);
    ctx.fillStyle=e.hp/e.maxHp>.5?'#7ae8a0':'#e87a7a'; ctx.fillRect(e.x-2,e.y-8,(e.w+4)*(e.hp/e.maxHp),4);
  }
  if (t.label==='BOSS') {
    ctx.fillStyle='#ED93B1'; ctx.font='bold 9px Courier New'; ctx.textAlign='center';
    ctx.fillText('BOSS',cx,e.y-12); ctx.textAlign='left';
  }
}

function drawBullets() {
  for (const b of state.bullets) {
    ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2);
    ctx.fillStyle=b.color||'#EF9F27'; ctx.fill();
  }
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawFloaters() {
  ctx.font='bold 12px Courier New'; ctx.textAlign='center';
  for (const f of state.floaters) {
    ctx.globalAlpha=f.life/f.maxLife; ctx.fillStyle=f.color;
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}

function drawUpgradeInfo() {
  const dmg   = state.upgrades.bulletDmg;
  const armour = state.upgrades.wallArmour;
  const cd    = state.shootCooldownMax;
  ctx.font='10px Courier New'; ctx.fillStyle='#2a4060'; ctx.textAlign='left';
  ctx.fillText(`DMG:${dmg}  CD:${cd}f  ARM:${armour*20}%  GUN:${state.gunmenCount}  TUR:${state.turretCount}`, 8, H-8);

  // Wave progress bar (top-right corner of canvas)
  const bw=120, bh=4, bx=W-bw-8, by=8;
  ctx.fillStyle='#0d1525'; ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle='#7ab8e8';
  ctx.fillRect(bx, by, bw * Math.min(1,(state.wave-1)/(WIN_WAVE-1)), bh);
  ctx.fillStyle='#2a4060'; ctx.font='9px Courier New'; ctx.textAlign='right';
  ctx.fillText('WAVE '+state.wave+'/'+WIN_WAVE, W-8, by+14);
  ctx.textAlign='left';
}

function drawSlowmoTint() {
  if (!state.cheats.slowMode) return;
  ctx.fillStyle='rgba(56,138,221,.08)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#378ADD'; ctx.font='10px Courier New'; ctx.textAlign='right';
  ctx.fillText('SLOWMO',W-8,H-8); ctx.textAlign='left';
}

function drawOverlay() {
  if (state.phase === 'gameover') {
    ctx.fillStyle='rgba(8,12,20,.88)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#e87a7a'; ctx.font='bold 40px Courier New'; ctx.fillText('WALL DESTROYED',W/2,H/2-48);
    ctx.fillStyle='#e8c87a'; ctx.font='18px Courier New'; ctx.fillText('Score: '+state.score,W/2,H/2-4);
    if (state.score > 0 && state.score >= highScore) {
      ctx.fillStyle='#EF9F27'; ctx.font='bold 13px Courier New'; ctx.fillText('★  NEW HIGH SCORE  ★',W/2,H/2+26);
    } else {
      ctx.fillStyle='#4a6080'; ctx.font='12px Courier New'; ctx.fillText('Best: '+highScore,W/2,H/2+26);
    }
    ctx.fillStyle='#2a4060'; ctx.font='11px Courier New';
    ctx.fillText('Type  KABOOM  ·  Press R to restart',W/2,H/2+60);
    ctx.textAlign='left';
  }

  if (state.phase === 'win') {
    ctx.fillStyle='rgba(8,12,20,.88)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#e8c87a'; ctx.font='bold 40px Courier New'; ctx.fillText('YOU SURVIVED!',W/2,H/2-60);
    ctx.fillStyle='#7ae8a0'; ctx.font='15px Courier New'; ctx.fillText('All '+WIN_WAVE+' waves defeated',W/2,H/2-20);
    ctx.fillStyle='#e8c87a'; ctx.font='20px Courier New'; ctx.fillText('Final Score: '+state.score,W/2,H/2+14);
    if (state.score >= highScore) {
      ctx.fillStyle='#EF9F27'; ctx.font='bold 13px Courier New'; ctx.fillText('★  NEW HIGH SCORE  ★',W/2,H/2+44);
    } else {
      ctx.fillStyle='#4a6080'; ctx.font='12px Courier New'; ctx.fillText('Best: '+highScore,W/2,H/2+44);
    }
    ctx.fillStyle='#2a4060'; ctx.font='11px Courier New'; ctx.fillText('Press R to play again',W/2,H/2+78);
    ctx.textAlign='left';
  }
}

function draw() {
  // Screenshake transform
  const sx = state.shake > 0 ? (Math.random()-.5)*state.shake : 0;
  const sy = state.shake > 0 ? (Math.random()-.5)*state.shake : 0;
  ctx.save();
  ctx.translate(sx, sy);

  drawSky(); drawGround(); drawWall();
  drawGunmen(); drawTurrets();
  for (const e of state.enemies) drawStickFigure(e);
  drawGun(); drawBullets(); drawParticles(); drawFloaters();
  drawUpgradeInfo(); drawSlowmoTint();

  ctx.restore();   // end screenshake

  drawOverlay();   // overlays are shake-free
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hud-wave').textContent  = state.wave + '/' + WIN_WAVE;
  document.getElementById('hud-hp').textContent    = Math.ceil(state.wallHp);
  document.getElementById('hud-money').textContent = '$'+state.money;
  document.getElementById('hud-score').textContent = state.score;
}

// ─── RESTART ──────────────────────────────────────────────────────────────────
function restartGame() {
  state.wave=1; state.wallHp=100; state.money=0; state.score=0;
  state.phase='playing'; state.shake=0;
  state.enemies=[]; state.bullets=[]; state.particles=[]; state.floaters=[];
  state.turrets=[]; state.gunmen=[];
  state.gunmenCount=0; state.turretCount=0; state.wallRepairs=0;
  state.upgrades.bulletDmg=1; state.upgrades.wallArmour=0;
  state.shootCooldownMax=6; state.shootCooldown=0;
  state.cheats={ godMode:false, noclipDmg:false, slowMode:false, konamiActive:false };
  document.getElementById('shop').classList.remove('open');
  startWave();
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    if (state.phase === 'gameover' || state.phase === 'win') restartGame();
  }
});

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function gameLoop() { update(); draw(); updateHUD(); requestAnimationFrame(gameLoop); }

// ─── BOOT ────────────────────────────────────────────────────────────────────
startWave();
requestAnimationFrame(gameLoop);
</script>
</body>
