<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm the House</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#1a0a00;
    display:flex; align-items:flex-start; justify-content:center;
    font-family:'Courier New',monospace;
    overflow:hidden;
  }

  /* ── SCALE WRAPPER ──────────────────────────────────────── */
  #game-wrapper {
    width:800px;
    display:flex; flex-direction:column;
    transform-origin: top center;
    flex-shrink:0;
  }

  /* ── HUD ───────────────────────────────────────────────── */
  #hud {
    width:800px; display:flex; justify-content:space-between; align-items:center;
    padding:8px 6px; background:#2a1800; border-bottom:2px solid #5a3a10;
  }
  .hud-group { display:flex; gap:20px; align-items:center; }
  .hud-item  { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .hud-label { font-size:9px; letter-spacing:.15em; color:#7a5a30; text-transform:uppercase; }
  .hud-value { font-size:16px; font-weight:bold; color:#e8c87a; }
  #hud-title { font-size:13px; letter-spacing:.25em; color:#c8a050; font-weight:bold; }

  /* ── CANVAS AREA ────────────────────────────────────────── */
  #canvas-wrap { position:relative; width:800px; }
  canvas { display:block; cursor:crosshair; width:800px; height:450px; }

  /* ── OVERLAYS ───────────────────────────────────────────── */
  #shop, #summary {
    display:none; position:absolute; top:0; left:0;
    width:800px; height:450px;
    flex-direction:column; align-items:center; justify-content:center; gap:12px;
    z-index:50;
  }
  #shop    { background:rgba(20,10,0,.97); border:2px solid #5a3a10; }
  #summary { background:rgba(20,10,0,.97); border:2px solid #5a3a10; }
  #shop.open    { display:flex; }
  #summary.open { display:flex; }

  #shop h2 { font-size:11px; letter-spacing:.25em; color:#7a5a30; text-transform:uppercase; }
  #shop-money-display { font-size:22px; font-weight:bold; color:#e8c87a; }

  .shop-grid {
    display:grid; grid-template-columns:repeat(4,1fr); gap:7px; width:760px;
    max-height:300px; overflow-y:auto;
  }
  .shop-card {
    background:#1a0e00; border:1px solid #3a2a10;
    padding:9px 11px; border-radius:2px;
    display:flex; flex-direction:column; gap:4px;
  }
  .shop-card:hover { border-color:#7a5a30; }
  .shop-card.maxed { opacity:.35; }
  .shop-name { font-size:11px; font-weight:bold; color:#c8a050; }
  .shop-desc { font-size:9px; color:#5a4020; line-height:1.45; min-height:24px; }
  .shop-btn {
    margin-top:2px; padding:5px 0; font-family:'Courier New',monospace;
    font-size:10px; letter-spacing:.07em; color:#e8c87a;
    background:transparent; border:1px solid #5a3a10; border-radius:2px;
    cursor:pointer; text-transform:uppercase; transition:background .15s;
  }
  .shop-btn:hover:not(:disabled) { background:#3a2000; }
  .shop-btn:disabled { opacity:.3; cursor:not-allowed; }
  .shop-btn.unaffordable { color:#c05030; border-color:#501a0a; }
  #next-wave-btn {
    margin-top:4px; padding:11px 48px; font-family:'Courier New',monospace; font-size:13px;
    letter-spacing:.2em; color:#e8c87a; background:transparent;
    border:1px solid #7a5a30; border-radius:2px; cursor:pointer; text-transform:uppercase;
  }
  #next-wave-btn:hover { background:#3a2000; }

  /* ── SUMMARY ────────────────────────────────────────────── */
  #sum-title { font-size:20px; font-weight:bold; letter-spacing:.3em; color:#e8c87a; text-transform:uppercase; }
  #sum-wave  { font-size:10px; letter-spacing:.2em; color:#7a5a30; text-transform:uppercase; }
  #sum-grid  { display:grid; grid-template-columns:1fr 1fr; gap:5px 36px; }
  .sum-row   { display:flex; justify-content:space-between; gap:20px; align-items:baseline; }
  .sum-label { font-size:10px; letter-spacing:.1em; color:#5a4020; text-transform:uppercase; }
  .sum-val   { font-size:17px; font-weight:bold; color:#e8c87a; }
  .sum-val.green { color:#7ae890; }
  .sum-val.red   { color:#e87a50; }
  #sum-bonus { font-size:12px; font-weight:bold; letter-spacing:.12em; color:#f5a030; min-height:20px; text-transform:uppercase; }
  #sum-btn {
    padding:10px 42px; font-family:'Courier New',monospace; font-size:12px;
    letter-spacing:.2em; color:#e8c87a; background:transparent;
    border:1px solid #7a5a30; border-radius:2px; cursor:pointer; text-transform:uppercase;
  }
  #sum-btn:hover { background:#3a2000; }

  /* ── CHEAT TOAST ─────────────────────────────────────────── */
  #cheat-toast {
    position:absolute; top:6px; left:50%; transform:translateX(-50%);
    background:#1a0e00; border:1px solid #7a5a30; color:#e8c87a;
    font-family:'Courier New',monospace; font-size:11px; letter-spacing:.12em;
    padding:5px 16px; border-radius:2px; opacity:0; transition:opacity .3s;
    pointer-events:none; text-transform:uppercase; white-space:nowrap; z-index:60;
  }
  #cheat-toast.show { opacity:1; }

  /* ── MESSAGE BAR ─────────────────────────────────────────── */
  #message {
    width:800px; text-align:center; padding:5px 8px;
    font-size:10px; letter-spacing:.1em; color:#7a5a30;
    text-transform:uppercase; background:#2a1800; border-top:2px solid #5a3a10;
    min-height:22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* ── CHEAT BAR ───────────────────────────────────────────── */
  #cheat-bar {
    width:800px; display:flex; gap:6px; align-items:center;
    padding:6px 8px; background:#1a0e00; border-top:1px solid #3a2010;
  }
  #cheat-label { font-size:9px; letter-spacing:.12em; color:#5a3a10; text-transform:uppercase; white-space:nowrap; }
  #cheat-input {
    flex:1; background:#0e0800; border:1px solid #3a2010; border-radius:2px;
    color:#e8c87a; font-family:'Courier New',monospace; font-size:13px;
    padding:5px 8px; outline:none; text-transform:uppercase; letter-spacing:.1em;
    min-width:0;
  }
  #cheat-input:focus { border-color:#7a5a30; }
  #cheat-input::placeholder { color:#3a2010; font-size:11px; text-transform:none; letter-spacing:0; }
  #cheat-submit {
    padding:5px 12px; background:transparent; border:1px solid #5a3a10;
    border-radius:2px; color:#c8a050; font-family:'Courier New',monospace;
    font-size:11px; letter-spacing:.08em; cursor:pointer; text-transform:uppercase; white-space:nowrap;
  }
  #cheat-submit:hover { background:#2a1800; }
  #cheat-hint { font-size:9px; color:#3a2010; letter-spacing:.04em; overflow:hidden; white-space:nowrap; }
</style>
</head>
<body>

<div id="game-wrapper">
<div id="cheat-toast"></div>

<div id="hud">
  <div class="hud-group">
    <div class="hud-item"><span class="hud-label">Wave</span><span class="hud-value" id="hud-wave">1/10</span></div>
    <div class="hud-item"><span class="hud-label">House HP</span><span class="hud-value" id="hud-hp" style="color:#e87050">100</span></div>
  </div>
  <div id="hud-title">STORM THE HOUSE</div>
  <div class="hud-group">
    <div class="hud-item"><span class="hud-label">Money</span><span class="hud-value" id="hud-money">$0</span></div>
    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-value" id="hud-score">0</span></div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game" width="800" height="450"></canvas>
  <div id="shop">
    <h2>— Between Waves — Spend Your Earnings —</h2>
    <div id="shop-money-display">$0</div>
    <div class="shop-grid" id="shop-grid"></div>
    <button id="next-wave-btn" onclick="closeShop()">▶  Send Next Wave</button>
  </div>
  <div id="summary">
    <div id="sum-title">WAVE COMPLETE</div>
    <div id="sum-wave"></div>
    <div id="sum-grid"></div>
    <div id="sum-bonus"></div>
    <button id="sum-btn" onclick="closeSummary()">▶  Open Shop</button>
  </div>
</div>

<div id="message">Click to shoot · Defend the house · Survive 10 waves</div>

<div id="cheat-bar">
  <span id="cheat-label">Cheat</span>
  <input id="cheat-input" type="text" maxlength="12" placeholder="type code + enter…" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
  <button id="cheat-submit" onclick="submitCheat()">▶ Enter</button>
  <span id="cheat-hint">IDDQD · IDKFA · KABOOM · BIGBAD · SLOWMO · WAVESKIP · FULLSHOP</span>
</div>

</div><!-- end #game-wrapper -->

<script>
// ═══════════════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ═══════════════════════════════════════════════════════════════
//  SCENE GEOMETRY  (matching original STH layout)
// ═══════════════════════════════════════════════════════════════
const GROUND_Y  = 340;          // flat ground line
const HOUSE_X   = 0;            // house left edge
const HOUSE_W   = 130;          // house width
const HOUSE_Y   = 170;          // house wall top (below roof peak)
const HOUSE_H   = GROUND_Y - HOUSE_Y;  // wall height
const ROOF_PEAK = 110;          // y of roof apex
const GUN_X     = 122;          // muzzle x (right window)
const GUN_Y     = 218;          // muzzle y

const WIN_WAVE  = 10;

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  wave:1, houseHp:100, houseMaxHp:100,
  money:0, score:0, paused:false,
  phase:'playing',   // playing | shop | summary | gameover

  enemies:[], bullets:[], particles:[], floaters:[],
  gunmen:[], turrets:[], snipers:[], mines:[], airdrops:[],
  sandbags:[],        // placeable ground barriers (bought in shop)

  upgrades:{ bulletDmg:1, wallArmour:0 },
  gunmenCount:0,
  turretCount:0, turretMax:2,
  sniperCount:0, sniperMax:2,
  repairWorkers:0,          // unlimited — each hire adds a repair worker
  mineLayerOwned:false, mineLayerTimer:0, mineCount:0, mineMax:6,
  houseRepairs:0, airdropTimer:0,
  sandbagCount:0, sandbagMax:4,
  missiles:[],
  cannonballs:[],
  missileLauncher:{ owned:false, count:0, cooldown:0, cooldown2:0, cooldownMax:300, blastRadius:120 },

  spawnQueue:[], spawnTimer:0, spawnInterval:90, waveClearing:false,
  shootCooldown:0, shootCooldownMax:6,
  shake:0,

  // Wave stats (reset each wave)
  waveStats:{ kills:0, shotsF:0, shotsH:0, moneyBefore:0, hpBefore:100, hpAfter:100 },

  // Endless mode
  endless:false,

  cheats:{ godMode:false, noclipDmg:false, slowMode:false, konamiActive:false },
};

let highScore = parseInt(localStorage.getItem('sth_hs') || '0');

// Leaderboard — top 5 scores [{score, wave, date}]
let leaderboard = JSON.parse(localStorage.getItem('sth_lb') || '[]');
function saveScore(score, wave){
  leaderboard.push({ score, wave, date: new Date().toLocaleDateString() });
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard = leaderboard.slice(0,5);
  localStorage.setItem('sth_lb', JSON.stringify(leaderboard));
  if(score > highScore){ highScore=score; localStorage.setItem('sth_hs', highScore); }
}

// ═══════════════════════════════════════════════════════════════
//  WEB AUDIO
// ═══════════════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
function tone(f,t,v,a,d,det=0){try{const g=AC.createGain(),o=AC.createOscillator();o.type=t;o.frequency.value=f;o.detune.value=det;g.gain.setValueAtTime(0,AC.currentTime);g.gain.linearRampToValueAtTime(v,AC.currentTime+a);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+a+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+a+d+.05);}catch(e){}}
function noise(v,d,f=800){try{const b=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate),D=b.getChannelData(0);for(let i=0;i<D.length;i++)D[i]=Math.random()*2-1;const s=AC.createBufferSource(),fl=AC.createBiquadFilter(),g=AC.createGain();fl.type='bandpass';fl.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);s.buffer=b;s.connect(fl);fl.connect(g);g.connect(AC.destination);s.start();s.stop(AC.currentTime+d+.05);}catch(e){}}
const SFX = {
  shoot:    ()=>{ tone(480,'square',.07,.005,.09); noise(.04,.05,1200); },
  hit:      ()=>{ noise(.1,.05,500); },
  death:    ()=>{ tone(200,'sawtooth',.1,.005,.18,-300); noise(.07,.1,250); },
  wallHit:  ()=>{ tone(70,'sine',.2,.01,.25); noise(.14,.14,120); },
  waveEnd:  ()=>{ [400,500,620,800].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.1,.01,.22),i*75)); },
  win:      ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.15,.02,.5),i*140)); },
  buy:      ()=>{ tone(660,'sine',.09,.01,.15); tone(880,'sine',.07,.05,.1); },
  denied:   ()=>{ tone(180,'square',.09,.01,.1); },
  snipe:    ()=>{ tone(1100,'square',.14,.001,.07); noise(.12,.1,4000); },
  explode:  ()=>{ noise(.3,.2,160); tone(75,'sine',.2,.01,.3); },
  missile:  ()=>{ noise(.12,.15,600); tone(220,'sawtooth',.08,.01,.2); },
  mExplode: ()=>{ noise(.45,.28,100); tone(60,'sine',.3,.005,.4); noise(.2,.15,300); },
  cannon:   ()=>{ noise(.5,.12,80); tone(55,'sine',.4,.005,.35); },
  cExplode: ()=>{ noise(.6,.35,60); tone(45,'sine',.5,.005,.5); noise(.3,.2,200); },
};
canvas.addEventListener('click', ()=>{ if(AC.state==='suspended') AC.resume(); },{once:true});

// ═══════════════════════════════════════════════════════════════
//  DEFENDER POSITIONS  (auto-placed, no slot selection needed)
// ═══════════════════════════════════════════════════════════════

// Fixed positions inside/on the house — cycles when gunmen count exceeds list
const GUNMAN_POS = [
  {x:108, y:225}, {x:88,  y:248},
  {x:108, y:270}, {x:88,  y:293},
  {x:108, y:315}, {x:88,  y:200},
  {x:100, y:180}, {x:115, y:340},
];

function addGunman(){
  const s = GUNMAN_POS[state.gunmenCount % GUNMAN_POS.length];
  // Slight jitter so stacked gunmen don't overlap exactly
  const jx = state.gunmenCount >= GUNMAN_POS.length ? (Math.random()-0.5)*10 : 0;
  const jy = state.gunmenCount >= GUNMAN_POS.length ? (Math.random()-0.5)*8  : 0;
  state.gunmen.push({
    x: s.x+jx, y: s.y+jy,
    fireTimer: Math.floor(Math.random()*80),
    fireRate:  80 + (state.gunmenCount % 4)*5,
    dmg:1, range:420, angle:0,
  });
  state.gunmenCount++;
}

// ═══════════════════════════════════════════════════════════════
//  ENEMY TYPES
// ═══════════════════════════════════════════════════════════════
const ET = {
  grunt:    {label:'',       w:14,h:24, hp:2,  spd:.7,  dmg:4,  $:10,  flying:false, col:'#222', shield:false},
  runner:   {label:'',       w:11,h:20, hp:1,  spd:1.9, dmg:2,  $:8,   flying:false, col:'#442200', shield:false},
  tank:     {label:'TANK',   w:22,h:28, hp:9,  spd:.35, dmg:14, $:30,  flying:false, col:'#334', shield:false},
  boss:     {label:'BOSS',   w:32,h:38, hp:28, spd:.28, dmg:22, $:100, flying:false, col:'#600020', shield:false},
  flyer:    {label:'',       w:18,h:14, hp:2,  spd:1.3, dmg:7,  $:15,  flying:true,  flyY:155, col:'#004466', shield:false},
  bomber:   {label:'BOMB',   w:24,h:16, hp:5,  spd:.55, dmg:18, $:35,  flying:true,  flyY:105, col:'#220044', shield:false},
  shielder: {label:'SHIELD', w:16,h:24, hp:3,  spd:.6,  dmg:8,  $:20,  flying:false, col:'#1a3a1a', shield:true, shieldHp:4},
};

// ═══════════════════════════════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════════════════════════════
const SHOP_ITEMS = [
  {
    id:'repair', name:'Repair House',
    desc:'Restore +30 HP to the house walls.',
    cost:()=> 50+state.houseRepairs*20,
    label:()=> state.houseHp>=state.houseMaxHp?'Already full':`+30 HP  ($${50+state.houseRepairs*20})`,
    action(){ state.houseHp=Math.min(state.houseMaxHp,state.houseHp+30); state.houseRepairs++; },
    ok:()=> state.houseHp<state.houseMaxHp,
  },
  {
    id:'reinforce', name:'Reinforce Walls',
    desc:'Increase max house HP by +50.',
    cost:()=> 150+Math.floor((state.houseMaxHp-100)/50)*80,
    label:()=> state.houseMaxHp>=300?'Maxed out':`+50 max HP  ($${150+Math.floor((state.houseMaxHp-100)/50)*80})`,
    action(){ state.houseMaxHp+=50; state.houseHp=Math.min(state.houseMaxHp,state.houseHp+20); },
    ok:()=> state.houseMaxHp<300,
  },
  {
    id:'sandbag', name:'Sandbags',
    desc:'Ground barrier. Slows enemies that pass through. Max 4.',
    cost:()=> 40+state.sandbagCount*20,
    label:()=> state.sandbagCount>=state.sandbagMax?'Full (4/4)':`Place  ($${40+state.sandbagCount*20})  [${state.sandbagCount}/4]`,
    action(){ addSandbag(); },
    ok:()=> state.sandbagCount<state.sandbagMax,
  },
  {
    id:'gunman', name:'Hire Gunman',
    desc:'Rifleman in the house. Unlimited — auto-placed in windows. Each costs more.',
    cost:()=> 80+state.gunmenCount*25,
    label:()=>`Hire  ($${80+state.gunmenCount*25})  [${state.gunmenCount} hired]`,
    action(){ addGunman(); },
    ok:()=> true,
  },
  {
    id:'missile', name:'Missile Launcher',
    desc:'RIGHT-CLICK to fire arcing missile. 5s reload. Buy twice for 2 independent launchers.',
    cost:()=> state.missileLauncher.count===0 ? 300 : 220,
    label:()=>{
      const c=state.missileLauncher.count;
      if(c===0) return 'Install  ($300)';
      if(c===1) return '2nd Launcher  ($220)  [1/2]';
      return 'Max launchers [2/2]';
    },
    action(){ const ml=state.missileLauncher; ml.count++; ml.owned=true; },
    ok:()=> state.missileLauncher.count<2,
  },
  {
    id:'blastradius', name:'Extend Blast Range',
    desc:'Increase missile blast radius by +30px per upgrade. Max 3 upgrades (120→210px).',
    cost:()=> 150 + Math.round((state.missileLauncher.blastRadius-120)/30) * 80,
    label:()=>{
      const lvl = Math.round((state.missileLauncher.blastRadius-120)/30);
      if(lvl>=3) return 'Max range  ['+state.missileLauncher.blastRadius+'px]';
      return `+30px  ($${150+lvl*80})  [${state.missileLauncher.blastRadius}px → ${state.missileLauncher.blastRadius+30}px]`;
    },
    action(){ state.missileLauncher.blastRadius+=30; },
    ok:()=> state.missileLauncher.owned && state.missileLauncher.blastRadius<210,
  },
  {
    id:'turret', name:'Build Turret',
    desc:'Rapid-fire auto-turret on the roof.',
    cost:()=> 150+state.turretCount*80,
    label:()=> state.turretCount>=state.turretMax?'Full (2/2)':`Build  ($${150+state.turretCount*80})  [${state.turretCount}/2]`,
    action(){ addTurret(); },
    ok:()=> state.turretCount<state.turretMax,
  },
  {
    id:'sniper', name:'Sniper Post',
    desc:'One-shots any ground enemy. Long reload.',
    cost:()=> 200+state.sniperCount*100,
    label:()=> state.sniperCount>=state.sniperMax?'Full (2/2)':`Build  ($${200+state.sniperCount*100})  [${state.sniperCount}/2]`,
    action(){ addSniper(); },
    ok:()=> state.sniperCount<state.sniperMax,
  },
  {
    id:'mines', name:'Mine Layer',
    desc:'Auto-plants ground mines. Flyers bypass them.',
    cost:()=> 120,
    label:()=> state.mineLayerOwned?'Installed':`Install  ($120)`,
    action(){ state.mineLayerOwned=true; state.mineLayerTimer=60; },
    ok:()=> !state.mineLayerOwned,
  },
  {
    id:'repairman', name:'Hire Repairman',
    desc:'Each worker repairs the house during battle. Unlimited — hire as many as you can afford.',
    cost:()=> 90+state.repairWorkers*40,
    label:()=>`Hire  ($${90+state.repairWorkers*40})  [${state.repairWorkers} working]`,
    action(){ state.repairWorkers++; },
    ok:()=> true,
  },
  {
    id:'dmg', name:'Bigger Bullets',
    desc:'+1 player bullet damage. Up to Lv5.',
    cost:()=> 80+(state.upgrades.bulletDmg-1)*40,
    label:()=> state.upgrades.bulletDmg>=5?'Max damage':`Upgrade  ($${80+(state.upgrades.bulletDmg-1)*40})  [Lv${state.upgrades.bulletDmg}/5]`,
    action(){ state.upgrades.bulletDmg++; },
    ok:()=> state.upgrades.bulletDmg<5,
  },
  {
    id:'rate', name:'Faster Reload',
    desc:'Reduce shoot cooldown. Up to Lv4.',
    cost:()=> 70+(4-Math.round(state.shootCooldownMax))*20,
    label:()=> state.shootCooldownMax<=2?'Max rate':`Upgrade  ($${70+(4-Math.round(state.shootCooldownMax))*20})`,
    action(){ state.shootCooldownMax=Math.max(2,state.shootCooldownMax-1); },
    ok:()=> state.shootCooldownMax>2,
  },
  {
    id:'armour', name:'Wall Armour',
    desc:'−20% incoming damage per stack. Max 3.',
    cost:()=> 100+state.upgrades.wallArmour*60,
    label:()=> state.upgrades.wallArmour>=3?'Max armour':`Upgrade  ($${100+state.upgrades.wallArmour*60})  [${state.upgrades.wallArmour}/3]`,

function waveDiff(w){ return {

  spdMult:  1+(w-1)*.06,
  interval: Math.max(32,90-w*5),
};}

function waveCompose(w){
  const list=[], n=4+w*2;
  for(let i=0;i<n;i++){
    const r=Math.random();
    if(w>=4&&r<.08)       list.push('boss');
    else if(w>=5&&r<.14)  list.push('bomber');
    else if(w>=3&&r<.22)  list.push('tank');
    else if(w>=2&&r<.32)  list.push('flyer');
    else if(w>=2&&r<.45)  list.push('runner');
    else                   list.push('grunt');
  }
  return list;
}

// ═══════════════════════════════════════════════════════════════
//  WAVE SYSTEM
// ═══════════════════════════════════════════════════════════════
function waveDiff(w){ return {
  hpMult:   1+(w-1)*.18,
  spdMult:  1+(w-1)*.06,
  interval: Math.max(20, 90-w*5),
};}

function waveCompose(w){
  const list=[], n=4+w*2;
  for(let i=0;i<n;i++){
    const r=Math.random();
    if(w>=4&&r<.08)       list.push('boss');
    else if(w>=5&&r<.14)  list.push('bomber');
    else if(w>=3&&r<.22)  list.push('tank');
    else if(w>=3&&r<.30)  list.push('shielder');
    else if(w>=2&&r<.38)  list.push('flyer');
    else if(w>=2&&r<.50)  list.push('runner');
    else                   list.push('grunt');
  }
  return list;
}

function startWave(){
  const q=waveCompose(state.wave), d=waveDiff(state.wave);
  state.spawnQueue=[...q]; state.spawnTimer=0;
  state.spawnInterval=d.interval; state._diff=d;
  state.waveClearing=false; state.phase='playing';
  // Reset per-wave stats
  state.waveStats={ kills:0, shotsF:0, shotsH:0, moneyBefore:state.money, hpBefore:state.houseHp, hpAfter:state.houseHp };
  const endlessTag = state.endless ? ' [ENDLESS]' : '';
  const finalTag   = (!state.endless && state.wave===WIN_WAVE) ? ' — FINAL WAVE!' : '';
  setMsg('Wave '+state.wave+finalTag+endlessTag+' — '+q.length+' enemies approaching');
}

function endWave(){
  state.enemies=[]; state.bullets=[];
  // Record HP after wave
  state.waveStats.hpAfter = state.houseHp;
  // Transition through summary first
  setTimeout(()=>{ if(state.phase==='playing') openSummary(); }, 500);
}

function openSummary(){
  state.phase='summary';
  const ws = state.waveStats;
  const acc = ws.shotsF > 0 ? Math.round(ws.shotsH/ws.shotsF*100) : 100;
  const earned = state.money - ws.moneyBefore;
  const hpLost = Math.max(0, ws.hpBefore - ws.hpAfter).toFixed(1);
  const perfect = parseFloat(hpLost) === 0;

  // Bonus for no damage
  let bonus = 0;
  if(perfect){ bonus = 50 + state.wave * 10; state.money += bonus; state.score += bonus; }

  document.getElementById('sum-wave').textContent = 'Wave ' + state.wave + (state.endless?' · Endless Mode':'') + ' cleared';
  document.getElementById('sum-grid').innerHTML = `
    <div class="sum-row"><span class="sum-label">Kills</span><span class="sum-val green">${ws.kills}</span></div>
    <div class="sum-row"><span class="sum-label">Accuracy</span><span class="sum-val ${acc>=70?'green':acc>=40?'':'red'}">${acc}%</span></div>
    <div class="sum-row"><span class="sum-label">Shots Fired</span><span class="sum-val">${ws.shotsF}</span></div>
    <div class="sum-row"><span class="sum-label">Money Earned</span><span class="sum-val green">$${earned}</span></div>
    <div class="sum-row"><span class="sum-label">Wall Damage</span><span class="sum-val ${perfect?'green':'red'}">${perfect?'NONE':'-'+hpLost+' HP'}</span></div>
    <div class="sum-row"><span class="sum-label">Wall HP</span><span class="sum-val">${Math.ceil(state.houseHp)}/${state.houseMaxHp}</span></div>
  `;
  document.getElementById('sum-bonus').textContent = perfect ? '★  PERFECT WAVE BONUS  +$'+bonus+'  ★' : '';

  // After WIN_WAVE — change button label based on mode
  const btn = document.getElementById('sum-btn');
  if(!state.endless && state.wave >= WIN_WAVE){
    btn.textContent = '▶  Enter Endless Mode';
  } else {
    btn.textContent = '▶  Open Shop';
  }

  document.getElementById('summary').classList.add('open');
}

function closeSummary(){
  document.getElementById('summary').classList.remove('open');

  // Crossed WIN_WAVE for first time → activate endless
  if(!state.endless && state.wave >= WIN_WAVE){
    state.endless = true;
    saveScore(state.score, state.wave);
    cToast('ENDLESS MODE ACTIVATED — how far can you go?','#f5a030');
  }

  state.wave++;
  openShop();
}

function triggerGameover(){
  state.phase='gameover';
  saveScore(state.score, state.wave);
  document.getElementById('summary').classList.remove('open');
  document.getElementById('shop').classList.remove('open');
}

function spawnEnemy(key){
  const t=ET[key], d=state._diff||{hpMult:1,spdMult:1};
  const hp=Math.ceil(t.hp*d.hpMult);
  const y=t.flying?(t.flyY+(Math.random()-.5)*18):(GROUND_Y-t.h+(Math.random()-.5)*4);
  state.enemies.push({
    x:W+14, y, w:t.w, h:t.h, hp, maxHp:hp,
    spd:t.spd*d.spdMult*(.9+Math.random()*.2),
    dmg:t.dmg, $:t.$, type:t,
    bob:Math.random()*Math.PI*2, slowTimer:0,
    shieldHp: t.shield ? t.shieldHp : 0,
  });
}

const mouse={x:W/2,y:H/2};
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width);
  mouse.y=(e.clientY-r.top)*(H/r.height);
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if(state.phase !== 'playing') return;
  if(!state.missileLauncher.owned) return;
  const ml=state.missileLauncher;
  const anyReady = ml.cooldown<=0 || (ml.count>=2 && ml.cooldown2<=0);
  if(!anyReady){ cToast('Missiles reloading…','#f5a030'); return; }
  const r = canvas.getBoundingClientRect();
  const tx = (e.clientX - r.left) * (W / r.width);
  const ty = (e.clientY - r.top)  * (H / r.height);
  launchMissile(tx, ty);
});

function launchMissile(tx, ty){
  const ml=state.missileLauncher;
  // Pick whichever launcher is ready (prefer launcher 1)
  const use2 = ml.count>=2 && ml.cooldown>0 && ml.cooldown2<=0;
  if(ml.cooldown>0 && (ml.count<2 || ml.cooldown2>0)){
    cToast('Missiles reloading…','#f5a030'); return;
  }
  const dx=tx-GUN_X, dy=ty-GUN_Y;
  // Slight positional offset per launcher
  const ox = use2 ? 2 : 0;
  const oy = use2 ? 18 : 0;
  state.missiles.push({
    sx:GUN_X+ox, sy:GUN_Y+oy, tx, ty,
    t:0, speed:0.013,
    trail:[], angle:Math.atan2(dy,dx),
  });
  if(use2) ml.cooldown2=ml.cooldownMax;
  else      ml.cooldown =ml.cooldownMax;
  SFX.missile();
  state.shake=Math.max(state.shake,4);
}

function explodeMissile(x, y){
  const BLAST = state.missileLauncher.blastRadius;
  [...state.enemies].filter(e=>Math.hypot(e.x+e.w/2-x,e.y+e.h/2-y)<BLAST)
    .forEach(e=>killEnemy(e));
  const particleCount = Math.floor(36 * (BLAST/120));
  for(let i=0;i<particleCount;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*8*(BLAST/120);
    state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,
      life:28+Math.random()*20,maxLife:48,
      col:i%3===0?'#fff':i%3===1?'#f5a030':'#cc2200',r:3+Math.random()*5});
  }
  state.floaters.push({x,y:GROUND_Y-2,text:'',col:'#3a1800',life:300,maxLife:300,crater:true,r:BLAST*0.28});
  pFloat(x,y-30,'💥 BOOM','#f5a030');
  state.shake=Math.max(state.shake,14);
  SFX.cExplode && SFX.cExplode();
}

canvas.addEventListener('click', e => {
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(W/r.width);
  const cy=(e.clientY-r.top)*(H/r.height);
  // Airdrop claim
  for(const a of state.airdrops){
    if(!a.landed||a.claimed) continue;
    if(Math.hypot(cx-a.x,cy-(a.y+Math.sin(a.bob)*4))<22){
      a.claimed=true; state.money+=a.value; state.score+=a.value;
      pFloat(a.x,a.y,'📦 +$'+a.value,'#e8c87a');
      pBurst(a.x,a.y,'#e8c87a',8); SFX.buy(); return;
    }
  }
  if(state.phase!=='playing'||state.shootCooldown>0) return;
  fire(mouse.x, mouse.y);
});

function fire(tx,ty){
  if(state.upgrades.spread){
    for(let i=-1;i<=1;i++){
      const a=Math.atan2(ty-GUN_Y,tx-GUN_X)+i*.08;
      addBullet(GUN_X,GUN_Y,Math.cos(a)*10,Math.sin(a)*10,state.upgrades.bulletDmg,'#f5a030');
    }
    state.waveStats.shotsF+=3;
  } else {
    shoot(tx,ty,GUN_X,GUN_Y,state.upgrades.bulletDmg,10,'#f5a030');
    state.waveStats.shotsF++;
  }
  state.shootCooldown=state.shootCooldownMax;
  pBurst(GUN_X,GUN_Y,'#f5a030',3);
  SFX.shoot();
}

function shoot(tx,ty,ox,oy,dmg,spd,col){
  const dx=tx-ox,dy=ty-oy,d=Math.hypot(dx,dy)||1;
  addBullet(ox,oy,(dx/d)*spd,(dy/d)*spd,dmg,col);
}
function addBullet(x,y,vx,vy,dmg,col){
  state.bullets.push({x,y,vx,vy,dmg,col:col||'#f5a030'});
}

const CODES={
  IDDQD:    ()=>{ state.cheats.godMode=!state.cheats.godMode; cToast(state.cheats.godMode?'GOD MODE — House is immortal':'GOD MODE off','#7ae8a0'); },

    state.enemies=[]; cToast('KABOOM — '+n+' enemies destroyed','#f5a030');
  },
  SLOWMO:   ()=>{ state.cheats.slowMode=!state.cheats.slowMode; cToast(state.cheats.slowMode?'SLOWMO on':'SLOWMO off','#85B7EB'); },

  FULLSHOP: ()=>{ state.money+=9999; cToast('FULLSHOP — $9999','#e8c87a'); renderShop(); },
};
const KON=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let kBuf=[];
function cToast(msg,col='#e8c87a'){
  const el=document.getElementById('cheat-toast');
  el.textContent='★  '+msg+'  ★'; el.style.color=col;
  el.classList.add('show'); clearTimeout(cTimer);
  cTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
function setMsg(t,col='#7a5a30'){
  const el=document.getElementById('message');
  el.textContent=t; el.style.color=col;
}
document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('cheat-input')) return;
  kBuf.push(e.key); if(kBuf.length>KON.length) kBuf.shift();
  if(kBuf.join()===KON.join()){
    state.cheats.konamiActive=!state.cheats.konamiActive;
    cToast(state.cheats.konamiActive?'↑↑↓↓←→←→BA — DOUBLE MONEY':'Konami off','#ED93B1');
    kBuf=[];
  }
  if(e.key.length===1&&/[a-zA-Z]/.test(e.key)){
    cBuf=(cBuf+e.key.toUpperCase()).slice(-12);
    for(const c of Object.keys(CODES)) if(cBuf.endsWith(c)){CODES[c]();cBuf='';break;}
  }
  if((e.key==='r'||e.key==='R')&&(state.phase==='gameover'||state.phase==='win')) restartGame();
});

// Mobile cheat input
function submitCheat(){
  const inp=document.getElementById('cheat-input');
  const val=inp.value.trim().toUpperCase();
  if(!val) return;

  // Check Konami text alias
  if(val==='KONAMI'||val==='KONAMICODE'){
    state.cheats.konamiActive=!state.cheats.konamiActive;
    cToast(state.cheats.konamiActive?'DOUBLE MONEY activated':'Konami off','#ED93B1');
    inp.value=''; return;
  }

  // Check restart
  if(val==='RESTART'||val==='NEWGAME'){
    if(state.phase==='gameover'||state.phase==='win') restartGame();
    cToast('Restarting…','#e8c87a');
    inp.value=''; return;
  }

  let found=false;
  for(const c of Object.keys(CODES)){
    if(val===c){ CODES[c](); found=true; break; }
  }
  if(!found) cToast('Unknown code: '+val,'#cc4422');
  inp.value='';
}

document.getElementById('cheat-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') submitCheat();
  e.stopPropagation(); // prevent game keydown handler picking up letters
});

// ═══════════════════════════════════════════════════════════════
//  NEAREST ENEMY HELPER
// ═══════════════════════════════════════════════════════════════
function nearest(ox,oy,range,flyingOk=true){
  let best=null,bd=range;
  for(const e of state.enemies){
    if(!flyingOk&&e.type.flying) continue;
    const d=Math.hypot(e.x+e.w/2-ox,e.y+e.h/2-oy);
    if(d<bd){bd=d;best=e;}
  }
  return best;
}

// ═══════════════════════════════════════════════════════════════
//  KILL ENEMY HELPER
// ═══════════════════════════════════════════════════════════════
function killEnemy(e){
  const reward=state.cheats.konamiActive?e.$*2:e.$;
  state.money+=reward; state.score+=reward;
  state.waveStats.kills++;
  pBurst(e.x+e.w/2,e.y+e.h/2,e.type.col,10);
  pFloat(e.x+e.w/2,e.y-4,'+$'+reward,'#e8c87a');
  state.shake=Math.max(state.shake,3);
  SFX.death();
  state.enemies=state.enemies.filter(en=>en!==e);
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════
function update(){
  if(state.paused||state.phase==='gameover'||state.phase==='shop'||state.phase==='summary') return;
  const sl=state.cheats.slowMode?.35:1;

  state.shake=Math.max(0,state.shake-.9);
  if(state.shootCooldown>0) state.shootCooldown-=sl;

  // Spawn
  state.spawnTimer+=sl;
  if(state.spawnQueue.length>0&&state.spawnTimer>=state.spawnInterval){
    state.spawnTimer=0; spawnEnemy(state.spawnQueue.shift());
  }

  // Gunmen
  for(const g of state.gunmen){
    g.fireTimer=Math.max(0,g.fireTimer-sl);
    const t=nearest(g.x,g.y,g.range);
    if(t){g.angle=Math.atan2(t.y+t.h/2-g.y,t.x+t.w/2-g.x);
      if(g.fireTimer===0){shoot(t.x+t.w/2,t.y+t.h/2,g.x,g.y,g.dmg,8,'#88aaff');pSpark(g.x,g.y,'#88aaff');g.fireTimer=g.fireRate;}}
  }
  // Turrets
  for(const t of state.turrets){
    t.fireTimer=Math.max(0,t.fireTimer-sl);
    const en=nearest(t.x,t.y,t.range);
    if(en){t.angle=Math.atan2(en.y+en.h/2-t.y,en.x+en.w/2-t.x);
      if(t.fireTimer===0){shoot(en.x+en.w/2,en.y+en.h/2,t.x,t.y,t.dmg,11,'#aaff88');pSpark(t.x,t.y,'#aaff88');t.fireTimer=t.fireRate;}}
  }
  // Snipers
  for(const s of state.snipers){
    s.fireTimer=Math.max(0,s.fireTimer-sl);
    if(s.flash>0) s.flash-=.07*sl;
    const en=nearest(s.x,s.y,s.range,false);
    if(en){s.angle=Math.atan2(en.y+en.h/2-s.y,en.x+en.w/2-s.x);
      if(s.fireTimer===0){
        const reward=state.cheats.konamiActive?en.$*2:en.$;
        state.money+=reward; state.score+=reward;
        pBurst(en.x+en.w/2,en.y+en.h/2,en.type.col,12);
        pFloat(en.x+en.w/2,en.y-4,'✕ +$'+reward,'#ffffff');
        state.enemies=state.enemies.filter(e=>e!==en);
        s.flash=1; s.fireTimer=s.fireRate;
        state.shake=Math.max(state.shake,2); SFX.snipe();
      }}
  }

  // Mine layer
  if(state.mineLayerOwned){
    state.mineLayerTimer=Math.max(0,state.mineLayerTimer-sl);
    if(state.mineLayerTimer===0&&state.mineCount<state.mineMax){layMine();state.mineLayerTimer=300;}
  }

  // Mines
  state.mines=state.mines.filter(m=>{
    if(!m.armed){m.armTimer-=sl;if(m.armTimer<=0)m.armed=true;return true;}
    for(const e of state.enemies){
      if(e.type.flying) continue;
      if(Math.abs((e.x+e.w/2)-m.x)<m.r+e.w/2){
        const BLAST=65;
        state.enemies.filter(en=>Math.hypot(en.x+en.w/2-m.x,en.y+en.h/2-m.y)<BLAST).forEach(en=>killEnemy(en));
        for(let p=0;p<20;p++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6;state.particles.push({x:m.x,y:m.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:25+Math.random()*15,maxLife:40,col:p%2?'#f5a030':'#ffcc44',r:3+Math.random()*4});}
        state.shake=Math.max(state.shake,9); state.mineCount--; SFX.explode(); return false;
      }
    }
    return true;
  });

  // Airdrops
  state.airdrops=state.airdrops.filter(a=>{
    if(a.claimed) return false;
    if(!a.landed){a.y+=a.vy*sl;if(a.y>=GROUND_Y-22){a.y=GROUND_Y-22;a.landed=true;}}
    else a.bob+=.05*sl;
    return true;
  });
  state.airdropTimer=Math.max(0,state.airdropTimer-sl);
  if(state.airdropTimer===0&&state.enemies.length>0){spawnAirdrop();state.airdropTimer=900;}

  // Repairmen — each worker adds to repair rate
  if(state.repairWorkers > 0){
    const rate = state.repairWorkers * 0.006;
    state.houseHp = Math.min(state.houseMaxHp, state.houseHp + rate * sl);
  }

  // Missile launcher cooldowns
  if(state.missileLauncher.cooldown  > 0) state.missileLauncher.cooldown  -= sl;
  if(state.missileLauncher.cooldown2 > 0) state.missileLauncher.cooldown2 -= sl;

  // Missiles — arc trajectory, explode at target
  state.missiles = state.missiles.filter(m => {
    m.t += m.speed * sl;
    m.x = m.sx + (m.tx - m.sx) * m.t;
    m.y = m.sy + (m.ty - m.sy) * m.t - Math.sin(m.t * Math.PI) * 140;
    const arcDy = (m.ty - m.sy) - Math.PI * 140 * Math.cos(m.t * Math.PI);
    m.angle = Math.atan2(arcDy, m.tx - m.sx);
    m.trail.push({x:m.x, y:m.y, life:12});
    m.trail = m.trail.filter(t => --t.life > 0);
    if(m.t >= 1){ explodeMissile(m.tx, m.ty); return false; }
    if(m.x < -20 || m.x > W+20 || m.y < -60 || m.y > H+20) return false;
    return true;
  });

  // Bullets → hit enemies
  state.bullets=state.bullets.filter(b=>{
    b.x+=b.vx*sl; b.y+=b.vy*sl;
    let hit=false;
    for(let i=state.enemies.length-1;i>=0;i--){
      const e=state.enemies[i];
      if(!hit&&b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        // Shield check — deflect bullets hitting the front (left) face
        if(e.shieldHp>0 && b.x < e.x+e.w*.4){
          e.shieldHp-=b.dmg; hit=true;
          pSpark(b.x,b.y,'#aaaaff');
          // Shield break
          if(e.shieldHp<=0){ e.shieldHp=0; pBurst(e.x,e.y+e.h*.5,'#6688aa',6); }
        } else {
          e.hp-=b.dmg; hit=true; pSpark(b.x,b.y,b.col); SFX.hit();
          state.waveStats.shotsH++;
          if(e.hp<=0) killEnemy(e);
        }
        break;
      }
    }
    return !hit&&b.x>-10&&b.x<W+10&&b.y>-20&&b.y<H+20;
  });

  // Enemies → move, check sandbags, attack house
  const dmgReduce=state.upgrades.wallArmour*.2;
  let houseHit=false;
  state.enemies.forEach(e=>{
    // Sandbag slowdown
    let inBag=false;
    if(!e.type.flying){
      for(const sb of state.sandbags){
        if(e.x+e.w>sb.x&&e.x<sb.x+sb.w&&e.y+e.h>sb.y) inBag=true;
      }
    }
    const effectiveSpd=inBag?e.spd*0.3:e.spd;
    e.x-=effectiveSpd*sl;
    e.bob+=.13*sl;

    // Hit house
    const houseRight=HOUSE_W;
    if(e.x<=houseRight){
      if(!state.cheats.godMode&&!state.cheats.noclipDmg){
        state.houseHp=Math.max(0,state.houseHp-e.dmg*.045*sl*(1-dmgReduce));
        houseHit=true;
      }
      if(state.houseHp<=0) triggerGameover();
    }
  });
  if(houseHit){state.shake=Math.max(state.shake,7);SFX.wallHit();}

  // Wave clear
  if(!state.waveClearing&&state.spawnQueue.length===0&&state.enemies.length===0){
    state.waveClearing=true; SFX.waveEnd();
    endWave();
  }

  // Particles & floaters
  state.particles=state.particles.filter(p=>{
    p.x+=p.vx*sl;p.y+=p.vy*sl;p.vy+=.09*sl;p.vx*=.91;p.life--;return p.life>0;});
  state.floaters=state.floaters.filter(f=>{f.y-=.65*sl;f.life--;return f.life>0;});
}

//  DRAW
// ═══════════════════════════════════════════════════════════════
function drawBg(){
  // Sky gradient — classic daytime
  const sky=ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#5ba3d9');
  sky.addColorStop(.6,'#a8d8f0');
  sky.addColorStop(1,'#d4eef9');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,GROUND_Y);

  // Clouds
  ctx.fillStyle='rgba(255,255,255,.8)';
  [[80,60,45],[200,40,30],[420,80,55],[600,55,38],[720,45,28]].forEach(([x,y,r])=>{
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+r*.6,y+5,r*.7,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-r*.5,y+8,r*.6,0,Math.PI*2); ctx.fill();
  });

  // Distant treeline
  ctx.fillStyle='#3a7a3a';
  for(let x=200;x<W;x+=28){
    const h=30+Math.sin(x*.08)*12;
    ctx.beginPath(); ctx.moveTo(x,GROUND_Y-h); ctx.lineTo(x+14,GROUND_Y); ctx.lineTo(x-14,GROUND_Y); ctx.closePath(); ctx.fill();
  }

  // Ground — brown dirt
  ctx.fillStyle='#8B6430'; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  // Ground highlight stripe
  ctx.fillStyle='#a07840'; ctx.fillRect(0,GROUND_Y,W,6);
  // Grass tuft line
  ctx.fillStyle='#5a8a2a';
  for(let x=HOUSE_W;x<W;x+=22){
    ctx.fillRect(x,GROUND_Y-4,3,6); ctx.fillRect(x+6,GROUND_Y-6,3,8); ctx.fillRect(x+12,GROUND_Y-3,3,5);
  }
}

// Window helper — standalone to avoid engine errors from nested function declarations
function drawWindow(wx,wy,ww,wh){
  ctx.fillStyle='#8ab8d8'; ctx.fillRect(wx,wy,ww,wh);
  ctx.fillStyle='rgba(255,255,255,.3)'; ctx.fillRect(wx,wy,ww/2,wh/2);
  ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
  ctx.strokeRect(wx,wy,ww,wh);
  ctx.beginPath(); ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
  ctx.lineWidth=1;
}

function drawHouse(){
  const HX=HOUSE_X, HW=HOUSE_W, HY=HOUSE_Y, HH=HOUSE_H;
  const PEAK=ROOF_PEAK;

  // House wall — light grey/cream
  ctx.fillStyle='#d4c8a8'; ctx.fillRect(HX,HY,HW,HH);

  // Brick pattern
  ctx.fillStyle='rgba(0,0,0,.06)';
  for(let ry=HY;ry<GROUND_Y;ry+=14){
    const offset=(Math.floor((ry-HY)/14)%2)*22;
    for(let rx=HX+offset;rx<HX+HW;rx+=44)
      ctx.fillRect(rx,ry,40,12);
  }

  // Roof — dark brown triangular
  ctx.fillStyle='#5a3010';
  ctx.beginPath();
  ctx.moveTo(HX-8,HY); ctx.lineTo(HX+HW/2,PEAK); ctx.lineTo(HX+HW+8,HY);
  ctx.closePath(); ctx.fill();
  // Roof shingles
  ctx.fillStyle='#3a1a00';
  for(let row=0;row<5;row++){
    const t=HY-(HY-PEAK)*(row/5);
    ctx.fillRect(HX-8+(row*4),t,HW+16-(row*8),3);
  }

  // Chimney
  ctx.fillStyle='#8a5030';
  ctx.fillRect(HX+HW-30,PEAK-20,16,HY-PEAK+20);
  ctx.fillStyle='#6a3820'; ctx.fillRect(HX+HW-33,PEAK-24,22,6);
  // Smoke puff
  const t=Date.now()/1000;
  ctx.fillStyle='rgba(200,200,200,.3)';
  [0,1,2].forEach(i=>{
    const sx=HX+HW-22, sy=PEAK-24-i*12-Math.sin(t+i)*4;
    const sr=6+i*3;
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  });

  // Door
  ctx.fillStyle='#6a3010'; ctx.fillRect(HX+16,GROUND_Y-55,28,55);
  ctx.fillStyle='#4a1a00'; ctx.fillRect(HX+16,GROUND_Y-55,28,4);
  ctx.fillStyle='rgba(255,220,150,.15)'; ctx.fillRect(HX+18,GROUND_Y-53,24,49);
  ctx.fillStyle='#c8a050'; ctx.beginPath(); ctx.arc(HX+38,GROUND_Y-28,2.5,0,Math.PI*2); ctx.fill();

  // Windows (uses standalone drawWindow defined above)
  drawWindow(HX+8,  HY+10, 30, 22);
  drawWindow(HX+68, HY+10, 38, 22);
  drawWindow(HX+8,  HY+60, 30, 22);
  drawWindow(HX+68, HY+60, 28, 22);

  // Wall HP bar under the house
  const barW=HW-4, barH=5, barX=HX+2, barY=GROUND_Y+8;
  ctx.fillStyle='#3a1a00'; ctx.fillRect(barX,barY,barW,barH);
  const hpR=Math.max(0,state.houseHp/state.houseMaxHp);
  ctx.fillStyle=hpR>.5?'#44aa44':hpR>.25?'#aaaa22':'#cc3322';
  ctx.fillRect(barX,barY,barW*hpR,barH);
  if(state.cheats.godMode){ctx.strokeStyle='#44ff44';ctx.lineWidth=1;ctx.strokeRect(HX-1,HY-1,HW+2,HH+2);}

  // Outline
  ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
  ctx.strokeRect(HX,HY,HW,HH);
}

function drawGun(){
  const angle=Math.atan2(mouse.y-GUN_Y,mouse.x-GUN_X);
  ctx.save(); ctx.translate(GUN_X,GUN_Y); ctx.rotate(angle);
  ctx.fillStyle='#2a1800'; ctx.fillRect(0,-3,28,6);
  ctx.fillStyle='#5a3010'; ctx.fillRect(-4,-5,8,10);
  ctx.restore();
  // Aim dot
  const dist=60;
  ctx.fillStyle='rgba(200,80,0,.5)';
  ctx.beginPath(); ctx.arc(GUN_X+Math.cos(angle)*dist,GUN_Y+Math.sin(angle)*dist,2,0,Math.PI*2); ctx.fill();
}

function drawDefenders(){
  // ── Range circles (drawn first, under everything)
  ctx.setLineDash([4,7]);
  for(const g of state.gunmen){
    ctx.strokeStyle='rgba(60,100,255,.12)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(g.x,g.y,g.range,0,Math.PI*2); ctx.stroke();
  }
  for(const t of state.turrets){
    ctx.strokeStyle='rgba(60,220,100,.12)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.range,0,Math.PI*2); ctx.stroke();
  }
  for(const s of state.snipers){
    // Full-width sweep line instead of huge circle
    ctx.strokeStyle='rgba(60,220,100,.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(s.x,s.y-4); ctx.lineTo(W,s.y-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s.x,s.y+4); ctx.lineTo(W,s.y+4); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.lineWidth=1;

  // ── Gunmen — proper stick figures positioned at window slots
  for(const g of state.gunmen){
    // Body
    ctx.strokeStyle='#2a0e00'; ctx.lineWidth=1.8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(g.x,g.y-4); ctx.lineTo(g.x,g.y+7); ctx.stroke();
    // Legs
    ctx.beginPath();
    ctx.moveTo(g.x,g.y+7); ctx.lineTo(g.x-4,g.y+14);
    ctx.moveTo(g.x,g.y+7); ctx.lineTo(g.x+4,g.y+14);
    ctx.stroke();
    // Arms + gun barrel
    ctx.save(); ctx.translate(g.x,g.y+1); ctx.rotate(g.angle);
    ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(16,0); ctx.stroke();
    ctx.restore();
    // Head
    ctx.fillStyle='#2a0e00';
    ctx.beginPath(); ctx.arc(g.x,g.y-8,4,0,Math.PI*2); ctx.fill();
    // Cooldown pip
    const cdG=1-(g.fireTimer/g.fireRate);
    ctx.strokeStyle='rgba(80,140,255,.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(g.x,g.y+18,3,-Math.PI/2,-Math.PI/2+cdG*Math.PI*2); ctx.stroke();
    ctx.lineCap='butt'; ctx.lineWidth=1;
  }

  // ── Turrets
  for(const t of state.turrets){
    ctx.fillStyle='#2a2a2a'; ctx.fillRect(t.x-10,t.y,20,14);
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.angle);
    ctx.fillStyle='#444'; ctx.fillRect(2,-3,22,6);
    ctx.restore();
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(t.x,t.y,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(t.x,t.y,3,0,Math.PI*2); ctx.fill();
    // Cooldown arc
    const cdT=1-(t.fireTimer/t.fireRate);
    ctx.strokeStyle='rgba(80,220,100,.75)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(t.x,t.y,12,-Math.PI/2,-Math.PI/2+cdT*Math.PI*2); ctx.stroke();
    ctx.lineWidth=1;
    ctx.fillStyle='rgba(80,220,100,.6)'; ctx.font='7px Courier New'; ctx.textAlign='center';
    ctx.fillText('TUR',t.x,t.y+24); ctx.textAlign='left';
  }

  // ── Snipers
  for(const s of state.snipers){
    ctx.fillStyle='#1a2a1a'; ctx.fillRect(s.x-8,s.y+2,16,16);
    ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.angle);
    ctx.fillStyle='#1a3a1a'; ctx.fillRect(2,-2.5,34,5);
    // Scope
    ctx.fillStyle='#3a6a3a'; ctx.fillRect(10,-5,8,10);
    ctx.restore();
    ctx.fillStyle='#2a4a2a'; ctx.beginPath(); ctx.arc(s.x,s.y,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#6a9a6a'; ctx.beginPath(); ctx.arc(s.x,s.y,2.5,0,Math.PI*2); ctx.fill();
    // Laser flash on fire
    if(s.flash>0){
      ctx.save(); ctx.globalAlpha=s.flash*.9;
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.shadowColor='#fff'; ctx.shadowBlur=6;
      ctx.beginPath();
      ctx.moveTo(s.x+Math.cos(s.angle)*10,s.y+Math.sin(s.angle)*10);
      ctx.lineTo(W,s.y+Math.sin(s.angle)*(W-s.x)+s.y);
      ctx.stroke(); ctx.restore();
    }
    // Cooldown arc
    const cdS=1-(s.fireTimer/s.fireRate);
    ctx.strokeStyle='rgba(80,220,100,.75)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(s.x,s.y,12,-Math.PI/2,-Math.PI/2+cdS*Math.PI*2); ctx.stroke();
    ctx.lineWidth=1;
    ctx.fillStyle='rgba(80,220,100,.6)'; ctx.font='7px Courier New'; ctx.textAlign='center';
    ctx.fillText('SNP',s.x,s.y+26); ctx.textAlign='left';
  }
}

function drawSandbags(){
  for(const sb of state.sandbags){
    // Stack of 3 bags
    ctx.fillStyle='#c8a850';
    for(let i=0;i<3;i++){
      const bx=sb.x+(i%2)*6, by=sb.y+sb.h-10-(i*7);
      ctx.beginPath(); ctx.ellipse(bx+14,by,13,6,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#8a6a20'; ctx.lineWidth=1; ctx.stroke();
    }
  }
}

function drawMines(){
  for(const m of state.mines){
    const pulse=Math.sin(Date.now()/200)*.35+.65;
    ctx.fillStyle=m.armed?`rgba(220,80,20,${pulse})`:'#5a4a30';
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=m.armed?'#ff6020':'#8a7a50'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.strokeStyle=m.armed?'#fff':'#aaa'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(m.x-4,m.y);ctx.lineTo(m.x+4,m.y);
    ctx.moveTo(m.x,m.y-4);ctx.lineTo(m.x,m.y+4);ctx.stroke();
  }
}

function drawAirdrops(){
  for(const a of state.airdrops){
    if(a.claimed) continue;
    const dy=a.landed?Math.sin(a.bob)*4:0;
    if(!a.landed){
      ctx.strokeStyle='rgba(200,200,200,.6)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(a.x,a.y-26,18,Math.PI,0); ctx.stroke();
      [[a.x-18,a.y-26],[a.x+18,a.y-26]].forEach(([px,py])=>{
        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(a.x+(px<a.x?-7:7),a.y+dy);ctx.stroke();
      });
    }
    ctx.fillStyle='#8B5a14'; ctx.fillRect(a.x-12,a.y-12+dy,24,22);
    ctx.fillStyle='#c8901a'; ctx.fillRect(a.x-12,a.y-12+dy,24,5);
    ctx.fillStyle='#c8901a'; ctx.fillRect(a.x-12,a.y-12+dy,5,22);
    ctx.fillStyle='#ffd060'; ctx.font='bold 9px Courier New'; ctx.textAlign='center';
    ctx.fillText('$'+a.value,a.x,a.y+5+dy);
    if(a.landed){
      const pr=Math.sin(Date.now()/280)*.3+.55;
      ctx.strokeStyle=`rgba(232,200,40,${pr})`; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(a.x,a.y+dy,18,0,Math.PI*2); ctx.stroke();
    }
    ctx.textAlign='left';
  }
}

function drawEnemy(e){
  const t=e.type;
  const cx=e.x+e.w/2;
  const bob=Math.sin(e.bob)*1.8;
  const ey=t.flying?e.y+Math.sin(e.bob*.9)*5:e.y;

  // Ground shadow (not for flyers)
  if(!t.flying){
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.beginPath(); ctx.ellipse(cx,GROUND_Y+1,e.w*.7,3,0,0,Math.PI*2); ctx.fill();
  }

  // Classic STH black stick figure
  const sc=e.w/14;
  const headR=e.w*.27;
  const bodyTop=ey+e.h*.32+bob;
  const bodyBot=ey+e.h*.72+bob;

  if(t.flying){
    // Wings
    ctx.fillStyle=t.col;
    ctx.globalAlpha=.75;
    const wf=Math.sin(e.bob*3)*12;
    ctx.beginPath(); ctx.moveTo(cx,ey+e.h*.4+bob);
    ctx.quadraticCurveTo(cx-e.w*.9,ey+e.h*.1+bob-wf,cx-e.w*1.1,ey+e.h*.4+bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx,ey+e.h*.4+bob);
    ctx.quadraticCurveTo(cx+e.w*.9,ey+e.h*.1+bob-wf,cx+e.w*1.1,ey+e.h*.4+bob); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Head
  ctx.fillStyle=t.col;
  ctx.beginPath(); ctx.arc(cx,ey+e.h*.18+bob,headR,0,Math.PI*2); ctx.fill();

  // Body
  ctx.strokeStyle=t.col; ctx.lineWidth=2.5*sc; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,bodyTop); ctx.lineTo(cx,bodyBot); ctx.stroke();

  if(!t.flying){
    // Arms swing
    const arm=Math.sin(e.bob*2)*9;
    ctx.beginPath();
    ctx.moveTo(cx,bodyTop+4); ctx.lineTo(cx-e.w*.55,bodyTop+14+arm);
    ctx.moveTo(cx,bodyTop+4); ctx.lineTo(cx+e.w*.55,bodyTop+14-arm);
    ctx.stroke();
    // Legs stride
    const leg=Math.sin(e.bob*2)*7;
    ctx.beginPath();
    ctx.moveTo(cx,bodyBot); ctx.lineTo(cx-e.w*.35,ey+e.h+leg);
    ctx.moveTo(cx,bodyBot); ctx.lineTo(cx+e.w*.35,ey+e.h-leg);
    ctx.stroke();
  }

  // Shield — wooden board on the left (front-facing) side
  if(e.shieldHp > 0){
    const sx = e.x - 7;
    const sy = ey + e.h*.25 + bob;
    const sh = e.h * .55;
    ctx.fillStyle = '#8B5a14';
    ctx.fillRect(sx, sy, 6, sh);
    ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, 6, sh);
    // Shield HP bar
    ctx.fillStyle = '#300'; ctx.fillRect(sx, sy-5, 6, 3);
    ctx.fillStyle = '#4a8'; ctx.fillRect(sx, sy-5, 6*(e.shieldHp/e.type.shieldHp), 3);
  }

  // HP bar when damaged
  if(e.hp<e.maxHp){
    ctx.fillStyle='#600'; ctx.fillRect(e.x-2,ey-10,e.w+4,4);
    ctx.fillStyle=e.hp/e.maxHp>.5?'#2a2':'#a22';
    ctx.fillRect(e.x-2,ey-10,(e.w+4)*(e.hp/e.maxHp),4);
  }

  // Label for big enemies
  if(t.label){
    ctx.fillStyle=t.col; ctx.font='bold 8px Courier New'; ctx.textAlign='center';
    ctx.fillText(t.label,cx,ey-13); ctx.textAlign='left';
  }
}

function drawBullets(){
  for(const b of state.bullets){
    ctx.fillStyle=b.col;
    ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
  }
}

function drawParticles(){
  for(const p of state.particles){
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawMissileLaunchers(){
  const ml = state.missileLauncher;
  if(!ml.owned) return;

  const launchers = [
    { y: HOUSE_Y+38, cd: ml.cooldown,  max: ml.cooldownMax },
    ...(ml.count>=2 ? [{ y: HOUSE_Y+82, cd: ml.cooldown2, max: ml.cooldownMax }] : []),
  ];

  launchers.forEach((l, idx) => {
    const lx   = HOUSE_W + 2;   // just right of house wall
    const ly   = l.y;
    const pct  = Math.max(0, 1 - l.cd / l.max);
    const ready = l.cd <= 0;

    // Mount bracket
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(lx - 8, ly - 10, 10, 20);

    // Barrel tube
    ctx.fillStyle = ready ? '#666' : '#3a3a3a';
    ctx.fillRect(lx, ly - 5, 24, 10);

    // End cap
    ctx.fillStyle = '#222';
    ctx.fillRect(lx + 22, ly - 6, 4, 12);

    // Rocket inside barrel (visible tip when ready)
    if(ready){
      // Rocket body inside barrel
      ctx.fillStyle = '#aaa';
      ctx.fillRect(lx + 4, ly - 3, 14, 6);
      // Red nose peeking out
      ctx.fillStyle = '#e83020';
      ctx.beginPath();
      ctx.moveTo(lx+18, ly-3);
      ctx.lineTo(lx+23, ly);
      ctx.lineTo(lx+18, ly+3);
      ctx.closePath(); ctx.fill();
      // Fins at back
      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.moveTo(lx+4,ly-3); ctx.lineTo(lx+1,ly-8); ctx.lineTo(lx+6,ly-3); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(lx+4,ly+3); ctx.lineTo(lx+1,ly+8); ctx.lineTo(lx+6,ly+3); ctx.closePath(); ctx.fill();
      // Ready flash indicator
      const pulse = Math.sin(Date.now()/200)*0.4+0.6;
      ctx.fillStyle = `rgba(245,160,48,${pulse})`;
      ctx.beginPath(); ctx.arc(lx-4, ly, 3, 0, Math.PI*2); ctx.fill();
    } else {
      // Reload progress bar on barrel
      ctx.fillStyle = '#1a0e00';
      ctx.fillRect(lx+1, ly-4, 20, 8);
      ctx.fillStyle = '#c85000';
      ctx.fillRect(lx+1, ly-4, 20*pct, 8);
      // Dim indicator
      ctx.fillStyle = '#442200';
      ctx.beginPath(); ctx.arc(lx-4, ly, 3, 0, Math.PI*2); ctx.fill();
    }

    // Launcher label + blast radius
    ctx.fillStyle = ready ? '#f5a030' : '#663300';
    ctx.font = '7px Courier New'; ctx.textAlign = 'left';
    ctx.fillText((idx===0?'ML1':'ML2')+' '+state.missileLauncher.blastRadius+'px', lx+27, ly+3);
  });

  ctx.textAlign = 'left';
}

function drawMissiles(){
  for(const m of state.missiles){
    // Ground shadow
    const gx = m.sx + (m.tx - m.sx) * m.t;
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.beginPath(); ctx.ellipse(gx, GROUND_Y, 6, 2, 0, 0, Math.PI*2); ctx.fill();
    // Smoke trail
    for(const t of m.trail){
      ctx.globalAlpha = (t.life/12) * 0.5;
      ctx.fillStyle = '#c8a060';
      ctx.beginPath(); ctx.arc(t.x, t.y, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Rocket body along arc tangent
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.angle);
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(-10, -3, 16, 6);
    ctx.fillStyle = '#e83020';
    ctx.beginPath(); ctx.moveTo(6,-3); ctx.lineTo(13,0); ctx.lineTo(6,3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.moveTo(-10,-3); ctx.lineTo(-15,-7); ctx.lineTo(-8,-3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-10, 3); ctx.lineTo(-15, 7); ctx.lineTo(-8,  3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#f5a030';
    ctx.beginPath(); ctx.moveTo(-10,-2); ctx.lineTo(-16+Math.random()*3, 0); ctx.lineTo(-10,2); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // (reload indicator is now drawn on the house by drawMissileLaunchers)
}

function drawCraters(){
  // Persistent crater marks from cannonball landings
  for(const f of state.floaters){
    if(!f.crater) continue;
    ctx.globalAlpha=f.life/f.maxLife*.7;
    ctx.fillStyle=f.col;
    ctx.beginPath(); ctx.ellipse(f.x,f.y,f.r,f.r*.35,0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawFloaters(){
  ctx.font='bold 12px Courier New'; ctx.textAlign='center';
  for(const f of state.floaters){
    if(f.ring){
      // Shockwave expanding ring
      f.r = (1 - f.life/f.maxLife) * 90;
      ctx.globalAlpha = (f.life/f.maxLife) * 0.6;
      ctx.strokeStyle = '#f5a030'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.stroke();
    } else {
      ctx.globalAlpha = f.life/f.maxLife; ctx.fillStyle = f.col;
      ctx.fillText(f.text, f.x, f.y);
    }
  }
  ctx.globalAlpha=1; ctx.lineWidth=1; ctx.textAlign='left';
}

function drawHUD(){
  // Wave progress bar along bottom of canvas
  const bw=W, bh=4;
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillRect(0,H-bh,bw,bh);
  ctx.fillStyle='#c8a050';
  ctx.fillRect(0,H-bh,bw*Math.min(1,(state.wave-1)/(WIN_WAVE-1)),bh);
  // Status line
  const dmg=state.upgrades.bulletDmg, arm=state.upgrades.wallArmour;
  const bits=[`DMG:${dmg}`,`ARM:${arm*20}%`,`GUN:${state.gunmenCount}`,`TUR:${state.turretCount}`];
  if(state.sniperCount>0) bits.push(`SNP:${state.sniperCount}`);
  if(state.mineLayerOwned) bits.push(`MINES:${state.mineCount}/${state.mineMax}`);
  if(state.repairWorkers>0) bits.push(`REP:${state.repairWorkers}`);
  if(state.missileLauncher.owned) bits.push(`🚀`);
  if(state.sandbagCount>0) bits.push(`BAG:${state.sandbagCount}`);
  ctx.font='9px Courier New'; ctx.fillStyle='rgba(80,50,10,.7)'; ctx.textAlign='right';
  ctx.fillText(bits.join(' · '),W-6,H-8); ctx.textAlign='left';
}

function drawSlowmo(){
  if(!state.cheats.slowMode) return;
  ctx.fillStyle='rgba(30,80,160,.08)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(100,160,255,.4)'; ctx.font='9px Courier New'; ctx.textAlign='right';
  ctx.fillText('SLOWMO',W-6,14); ctx.textAlign='left';
}

function drawOverlay(){
  if(state.phase==='gameover'){
    ctx.fillStyle='rgba(10,5,0,.9)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    const tag=state.endless?'ENDLESS OVER — Wave '+state.wave:'HOUSE DESTROYED';
    ctx.fillStyle=state.endless?'#f5a030':'#cc3322';
    ctx.font='bold 34px Courier New'; ctx.fillText(tag,W/2,H/2-112);
    ctx.fillStyle='#e8c87a'; ctx.font='16px Courier New';
    ctx.fillText('Score: '+state.score.toLocaleString()+(state.score>=highScore?' ★':''),W/2,H/2-82);
    ctx.fillStyle='#5a3a10'; ctx.font='10px Courier New';
    ctx.fillText('— LEADERBOARD —',W/2,H/2-56);
    if(leaderboard.length===0){
      ctx.fillStyle='#3a2010'; ctx.font='11px Courier New';
      ctx.fillText('No scores yet',W/2,H/2-34);
    } else {
      leaderboard.forEach((e,i)=>{
        ctx.fillStyle=i===0?'#f5a030':'#7a5a30';
        ctx.font=(i===0?'bold ':'')+'12px Courier New';
        ctx.fillText(`${i+1}.  ${e.score.toLocaleString()}  ·  wave ${e.wave}  ·  ${e.date}`,W/2,H/2-32+i*22);
      });
    }
    ctx.fillStyle='#3a2010'; ctx.font='10px Courier New';
    ctx.fillText('Press R to restart  ·  KABOOM still works',W/2,H/2+86);
    ctx.textAlign='left';
  }
}

function draw(){
  const sx=state.shake>0?(Math.random()-.5)*state.shake:0;
  const sy=state.shake>0?(Math.random()-.5)*state.shake:0;
  ctx.save(); ctx.translate(sx,sy);
  ctx.setLineDash([]); ctx.lineWidth=1; ctx.lineCap='butt'; ctx.globalAlpha=1;
  drawBg();
  drawCraters();
  drawSandbags(); drawMines(); drawAirdrops();
  for(const e of state.enemies) drawEnemy(e);
  drawHouse();
  drawMissileLaunchers();
  drawDefenders();
  drawGun();
  drawMissiles();
  drawBullets(); drawParticles(); drawFloaters();
  drawHUD(); drawSlowmo();
  ctx.restore();
  drawOverlay();
}

function updateHUD(){
  document.getElementById('hud-wave').textContent=state.endless?state.wave+' ∞':state.wave+'/'+WIN_WAVE;
  document.getElementById('hud-hp').textContent=Math.ceil(state.houseHp);
  document.getElementById('hud-money').textContent='$'+state.money;
  document.getElementById('hud-score').textContent=state.score.toLocaleString();
}

function restartGame(){
  Object.assign(state,{
    wave:1,houseHp:100,houseMaxHp:100,money:0,score:0,paused:false,phase:'playing',
    enemies:[],bullets:[],particles:[],floaters:[],missiles:[],cannonballs:[],
    gunmen:[],turrets:[],snipers:[],mines:[],airdrops:[],sandbags:[],
    upgrades:{bulletDmg:1,wallArmour:0,spread:false},
    gunmenCount:0,turretCount:0,sniperCount:0,repairWorkers:0,
    mineLayerOwned:false,mineLayerTimer:0,mineCount:0,
    houseRepairs:0,airdropTimer:0,sandbagCount:0,
    missileLauncher:{owned:false,count:0,cooldown:0,cooldown2:0,cooldownMax:300,blastRadius:120},
    spawnQueue:[],spawnTimer:0,spawnInterval:90,waveClearing:false,
    shootCooldown:0,shootCooldownMax:6,shake:0,endless:false,
    waveStats:{kills:0,shotsF:0,shotsH:0,moneyBefore:0,hpBefore:100,hpAfter:100},
    cheats:{godMode:false,noclipDmg:false,slowMode:false,konamiActive:false},
  });
  document.getElementById('shop').classList.remove('open');
  document.getElementById('summary').classList.remove('open');
  startWave();
}

function scaleGame(){
  const wrapper = document.getElementById('game-wrapper');
  const totalH  = 42 + 450 + 22 + 42; // hud + canvas + message + cheat bar ≈ 556px
  const scaleX  = window.innerWidth  / 800;
  const scaleY  = window.innerHeight / totalH;
  const scale   = Math.min(scaleX, scaleY, 1); // never upscale on desktop
  wrapper.style.transform = `scale(${scale})`;
  // Collapse vertical whitespace created by scaling down
  wrapper.style.marginBottom = `-${totalH * (1 - scale)}px`;
}
window.addEventListener('resize', scaleGame);
scaleGame();

function loop(){ update(); draw(); updateHUD(); requestAnimationFrame(loop); }
startWave();
requestAnimationFrame(loop);
</script>
</body>
</html>
